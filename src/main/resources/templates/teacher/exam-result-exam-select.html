<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragment/css :: css}"></head>


<body class="bg-light">


<div th:replace="~{teacher/teacher-dashboard :: teacherHeader}">
</div>


<div class="container-fluid">

<div class="row">


<div class="col-md-3 col-lg-2 p-0">

<div th:replace="~{teacher/teacher-dashboard :: sidebar}">
</div>

</div>



<div class="col-md-9 col-lg-10">


<div class="container mt-4">


<div class="card shadow">


<div class="card-header bg-primary text-white">

<h4 class="mb-0">

<i class="bi bi-file-earmark-text me-2"></i>

Select Exam

</h4>

</div>



<div class="card-body">


<table class="table table-bordered table-hover">


<thead class="table-dark">

<tr>

<th>No</th>

<th>Course</th>

<th>Exam Name</th>

<th>Type</th>

<th>Date</th>

<th>Action</th>

</tr>

</thead>



<tbody>


<tr th:each="exam, stat : ${exams}">


<td th:text="${stat.count}"></td>


<td th:text="${exam.courseName}"></td>


<td th:text="${exam.name}"></td>


<td th:text="${exam.examType}"></td>


<td th:text="${#temporals.format(exam.examDate,'dd-MM-yyyy HH:mm')}"></td>



<td>

<a th:href="@{/exam/result/{id}(id=${exam.examID})}"
   class="btn btn-success btn-sm">

<i class="bi bi-pencil-square"></i>
Add Result

</a>


<a th:href="@{/exam/result/view/{id}(id=${exam.examID})}"
   class="btn btn-primary btn-sm">

<i class="bi bi-eye"></i>
View Result

</a>


</td>


</tr>


</tbody>


</table>


</div>


</div>


</div>


</div>


</div>


</div>



<div th:replace="~{fragment/footer :: footer}">
</div>


<div th:replace="~{fragment/js :: js}">
</div>


</body>

</html>
