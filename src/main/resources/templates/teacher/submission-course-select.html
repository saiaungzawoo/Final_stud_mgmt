<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">


<head th:replace="~{fragment/css :: css}"></head>


<body class="bg-light">


<!-- Teacher Header -->
<div th:replace="~{teacher/teacher-dashboard :: teacherHeader}">
</div>



<div class="container-fluid">

    <div class="row">


        <div class="col-md-12 p-4">


            <div class="card shadow">


                <div class="card-header bg-primary text-white">

                    <h4 class="mb-0">

                        <i class="bi bi-book"></i>
                        Select Course

                    </h4>

                </div>



                <div class="card-body">


                    <div class="row">


                        <div class="col-md-4 mb-3"
                             th:each="course : ${courses}">


                            <div class="card h-100 shadow-sm">


                                <div class="card-body">


                                    <h5 class="card-title"
                                        th:text="${course.name}">
                                        Course Name
                                    </h5>



                                    <p class="text-muted">

                                        Select this course to view assignments

                                    </p>


<a th:href="@{/teacher/submission/assignment/{id}(id=${course.CourseId})}"
   class="btn btn-primary">

    <i class="bi bi-journal-text"></i>
    View Assignment

</a>


                                </div>


                            </div>


                        </div>


                    </div>


                </div>


            </div>


        </div>


    </div>


</div>



<div th:replace="~{fragment/footer :: footer}">
</div>



<div th:replace="~{fragment/js :: js}">
</div>


</body>

</html>
