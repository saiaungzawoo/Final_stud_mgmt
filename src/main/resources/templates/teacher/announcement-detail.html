<!DOCTYPE html>
<html lang="en"
xmlns:th="http://www.thymeleaf.org">


<head th:replace="~{fragment/css :: css}"></head>


<body>


<div th:replace="~{teacher/teacher-dashboard :: teacherHeader}"></div>



<div class="container mt-4">


<div class="card">


<div class="card-header bg-primary text-white">

<h4>
<i class="bi bi-megaphone"></i>
Announcement Detail
</h4>

</div>



<div class="card-body">


<h3 th:text="${announcement.title}">
Title
</h3>


<hr>


<p>
<strong>Content:</strong>
</p>

<p th:text="${announcement.content}">
Content
</p>



<p>
<strong>Target:</strong>

<span th:text="${announcement.targetType}">
</span>

</p>



<p>
<strong>Priority:</strong>

<span th:text="${announcement.priority}">
</span>

</p>



<p>
<strong>Publish Date:</strong>

<span th:text="${announcement.publishDate}">
</span>

</p>



<div th:if="${announcement.createdByID == teacherID}">

<a th:href="@{/announcement/edit/{id}
(id=${announcement.announcementID})}"
class="btn btn-warning">

Edit

</a>

</div>



<a th:href="@{/announcement/list}"
class="btn btn-secondary">

Back

</a>


</div>


</div>


</div>


</body>
</html>
