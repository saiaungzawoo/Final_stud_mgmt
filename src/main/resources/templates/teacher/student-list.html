<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">


<head th:replace="~{fragment/css :: css}"></head>


<body>


<div th:replace="~{teacher/teacher-dashboard :: teacherHeader}"></div>



<div class="container-fluid">

    <div class="row">


        <!-- Sidebar -->

        <div class="col-md-3 col-lg-2 p-0">

            <div th:replace="~{teacher/teacher-dashboard :: sidebar}">
            </div>

        </div>




        <!-- Main Content -->

        <main class="col-md-9 col-lg-10 p-4 bg-light min-vh-100">


            <!-- Header -->

            <div class="d-flex justify-content-between align-items-center mb-4">


                <div>

                    <h2 class="fw-bold mb-1">
                        Student List
                    </h2>

                    <p class="text-muted mb-0">
                        View students and attendance history.
                    </p>

                </div>



                <a th:href="@{/attendance/list}"
                   class="btn btn-outline-secondary">

                    <i class="bi bi-arrow-left"></i>
                    Back

                </a>


            </div>





            <!-- Student Table -->


            <div class="card shadow-sm border-0">


                <div class="card-header bg-white">

                    <h5 class="mb-0">
                        Enrolled Students
                    </h5>

                </div>




                <div class="card-body">


                    <div class="table-responsive">


                        <table class="table table-hover align-middle">


                            <thead class="table-light">

                            <tr>

                                <th width="80">
                                    No
                                </th>


                                <th>
                                    Student Name
                                </th>


                                <th class="text-center">
                                    Action
                                </th>


                            </tr>

                            </thead>



                            <tbody>



                            <tr th:each="student,stat:${studentList}">


                                <td th:text="${stat.count}">
                                </td>




                                <td>


                                    <a th:href="@{/attendance/student/{id}(id=${student.userID})}"
                                       class="text-decoration-none fw-semibold"
                                       th:text="${student.studentName}">

                                    </a>


                                </td>





                                <td class="text-center">


                                    <a class="btn btn-primary btn-sm"
                                       th:href="@{/attendance/student/{id}(id=${student.userID})}">


                                        <i class="bi bi-calendar-check"></i>

                                        View Attendance


                                    </a>
  <a class="btn btn-success btn-sm"
       th:href="@{/exam/result/student/{id}(id=${student.userID})}">


        <i class="bi bi-clipboard-check"></i>

        View Exam Result


    </a>



                                </td>



                            </tr>





                            <tr th:if="${#lists.isEmpty(studentList)}">


                                <td colspan="3"
                                    class="text-center text-muted py-5">


                                    No students found.


                                </td>


                            </tr>




                            </tbody>



                        </table>


                    </div>


                </div>


            </div>



        </main>


    </div>


</div>





<div th:replace="~{fragment/footer :: footer}"></div>

<div th:replace="~{fragment/js :: js}"></div>


</body>

</html>
