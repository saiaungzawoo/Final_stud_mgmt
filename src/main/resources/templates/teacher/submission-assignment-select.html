<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">


<head th:replace="~{fragment/css :: css}"></head>


<body class="bg-light">


<!-- Teacher Header -->
<div th:replace="~{teacher/teacher-dashboard :: teacherHeader}">
</div>



<div class="container-fluid">

    <div class="row">


        <div class="col-md-12 p-4">


            <div class="card shadow">


                <div class="card-header bg-primary text-white">

                    <h4 class="mb-0">

                        <i class="bi bi-journal-text"></i>
                        Select Assignment

                    </h4>

                </div>



                <div class="card-body">


                    <div class="row">


                        <!-- Assignment Card -->

                        <div class="col-md-4 mb-4"
                             th:each="assignment : ${assignments}">


                            <div class="card h-100 shadow-sm">


                                <div class="card-body">


                                    <h5 class="card-title"
                                        th:text="${assignment.title}">
                                        Assignment Title
                                    </h5>



                                    <p class="text-muted">

                                        Course:

                                        <span th:text="${assignment.CourseName}">
                                            Course Name
                                        </span>

                                    </p>



                                    <p>

                                        <strong>Max Score:</strong>

                                        <span th:text="${assignment.maxScore}">
                                            100
                                        </span>

                                    </p>



                                    <p>

                                        <strong>Due Date:</strong>

                                        <span th:text="${assignment.dueDate}">
                                            Date
                                        </span>

                                    </p>



                                    <p>

                                        <strong>Status:</strong>

                                        <span class="badge bg-success"
                                              th:text="${assignment.status}">
                                            Published
                                        </span>

                                    </p>




                                    <a th:href="@{/teacher/submission/list/{id}(id=${assignment.assignmentID})}"
                                       class="btn btn-primary">


                                        <i class="bi bi-people"></i>

                                        View Submission


                                    </a>


                                </div>


                            </div>


                        </div>


                    </div>


                    <!-- Empty Data -->

                    <div th:if="${#lists.isEmpty(assignments)}"
                         class="text-center text-muted p-4">


                        <i class="bi bi-exclamation-circle"></i>

                        No Assignment Found


                    </div>



                </div>


            </div>


        </div>


    </div>


</div>





<div th:replace="~{fragment/footer :: footer}">
</div>



<div th:replace="~{fragment/js :: js}">
</div>



</body>

</html>
