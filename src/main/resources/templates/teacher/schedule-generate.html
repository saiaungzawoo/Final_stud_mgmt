<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragment/css :: css}"></head>

<body>


<div th:replace="~{teacher/teacher-dashboard :: teacherHeader}"></div>


<div class="container-fluid">

    <div class="row">


        <!-- Sidebar -->
        <div class="col-md-3 col-lg-2 p-0">

            <div th:replace="~{teacher/teacher-dashboard :: sidebar}"></div>

        </div>



        <!-- Main Content -->
        <main class="col-md-9 col-lg-10 p-4 bg-light min-vh-100">


            <div class="mb-4">

                <h2 class="fw-bold">
                    Generate Course Schedule
                </h2>

                <p class="text-muted">
                    Create class schedules based on course duration.
                </p>

            </div>



            <div class="card shadow-sm border-0">


                <div class="card-body">

<form method="post"
      th:object="${schedule}"
      th:action="${isUpdate} ? @{/schedule/update} : @{/schedule/generate}">

<div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
    <i class="bi bi-exclamation-triangle-fill"></i>
    <span th:text="${error}"></span>

    <button type="button"
            class="btn-close"
            data-bs-dismiss="alert"></button>
</div>
    <!-- Course ID -->
    <input type="hidden" th:field="*{courseId}">

    <!-- Start Date -->
    <div class="mb-3">
        <label class="form-label">Start Date</label>
       <input type="date"
       class="form-control"
       th:value="${schedule.startDate}"
       name="startDate">
    </div>

    <!-- Time -->
    <div class="row">

        <div class="col-md-6 mb-3">
            <label class="form-label">Start Time</label>
            <input type="time"
       class="form-control"
       th:value="${#temporals.format(schedule.startTime,'HH:mm')}"
       name="startTime">
                  

        </div>

        <div class="col-md-6 mb-3">
            <label class="form-label">End Time</label>
           <input type="time"
       class="form-control"
       th:value="${#temporals.format(schedule.endTime,'HH:mm')}"
       name="endTime">
                 

        </div>

    </div>

    <!-- Room -->
    <div class="mb-3">
        <label class="form-label">Room</label>
        <input type="text"
               class="form-control"
               th:field="*{room}"
               placeholder="Room Number">
    </div>

    <!-- Repeat Days -->
    <div class="mb-3">

        <label class="form-label fw-bold">Repeat Days</label>

        <div class="row g-2">

            <div class="col-md-3">
                <input class="form-check-input"
                       type="checkbox"
                       th:field="*{repeatDays}"
                       value="MONDAY">
                <label class="ms-1">Monday</label>
            </div>

            <div class="col-md-3">
                <input class="form-check-input"
                       type="checkbox"
                       th:field="*{repeatDays}"
                       value="TUESDAY">
                <label class="ms-1">Tuesday</label>
            </div>

            <div class="col-md-3">
                <input class="form-check-input"
                       type="checkbox"
                       th:field="*{repeatDays}"
                       value="WEDNESDAY">
                <label class="ms-1">Wednesday</label>
            </div>

            <div class="col-md-3">
                <input class="form-check-input"
                       type="checkbox"
                       th:field="*{repeatDays}"
                       value="THURSDAY">
                <label class="ms-1">Thursday</label>
            </div>

            <div class="col-md-3">
                <input class="form-check-input"
                       type="checkbox"
                       th:field="*{repeatDays}"
                       value="FRIDAY">
                <label class="ms-1">Friday</label>
            </div>

            <div class="col-md-3">
                <input class="form-check-input"
                       type="checkbox"
                       th:field="*{repeatDays}"
                       value="SATURDAY">
                <label class="ms-1">Saturday</label>
            </div>

            <div class="col-md-3">
                <input class="form-check-input"
                       type="checkbox"
                       th:field="*{repeatDays}"
                       value="SUNDAY">
                <label class="ms-1">Sunday</label>
            </div>

        </div>

    </div>

    <!-- Topic -->
    <div class="mb-3">
        <label class="form-label">Topic Prefix</label>
        <input type="text"
               class="form-control"
               th:field="*{topicPrefix}"
               placeholder="Lesson">
    </div>

    <div class="text-end">

        <a th:href="@{/schedule/list}"
           class="btn btn-outline-primary">
            <i class="bi bi-list-ul"></i>
            View Schedule List
        </a>

        <button type="submit" class="btn btn-primary">

            <span th:if="${isUpdate}">
                Update Schedule
            </span>

            <span th:unless="${isUpdate}">
                Generate Schedule
            </span>

        </button>

    </div>

</form>
                </div>


            </div>



        </main>


    </div>


</div>



<div th:replace="~{fragment/footer :: footer}"></div>

<div th:replace="~{fragment/js :: js}"></div>


</body>

</html>
