<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragment/css :: css}"></head>
<body class="bg-light">

    <!-- Header Fragment ( Optional ) -->
   <div th:replace="~{teacher/teacher-dashboard :: teacherHeader}"></div>

   <div class="container-fluid">
        <div class="row">
           <div class="col-md-3 col-lg-2 p-0">
            <div th:replace="~{teacher/teacher-dashboard :: sidebar}"></div>
        </div>

            
            <!-- Main Content Area -->
<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">                
                <!-- Title Header -->
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom">
                    <h1 class="h2 text-dark"><i class="bi bi-award me-2 text-primary"></i>Exam Results Management</h1>
                </div>

                <!-- Alert Messages -->
                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show rounded-3 mb-4" role="alert">
                    <i class="bi bi-check-circle-fill me-2"></i>
                    
                    	<span th:text="${successMessage}"></span>
                    	
                    	<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show rounded-3 mb-4" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    	
                    	<span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <!-- 1. Select Course & Exam Section -->
                <div class="card border-0 shadow-sm rounded-3 mb-4">
                    <div class="card-body p-4">
                        <h5 class="fw-bold text-secondary mb-3"><i class="bi bi-funnel me-2"></i>Filter Exam Results</h5>
                        
                        <!-- Course Selection Form -->
                        <form th:action="@{/teacher/exam-results}" method="get" class="row g-3">
                            <div class="col-md-5">
                                <label for="courseSelect" class="form-label fw-bold">Select Course</label>
                                <select class="form-select" id="courseSelect" name="courseId" onchange="this.form.submit()">
                                    <option value="">-- Choose Course --</option>
                                    <option th:each="course : ${courses}"
                                            th:value="${course.courseId}"
                                            th:text="${course.name}"
                                            th:selected="${course.courseId == selectedCourseId}">
                                    </option>
                                </select>
                            </div>

                            <!-- Exam Selection (Visible only when course is selected) -->
                            <div class="col-md-5" th:if="${exams != null}">
                                <label for="examSelect" class="form-label fw-bold">Select Exam</label>
                                <select class="form-select" id="examSelect" name="examId" onchange="this.form.submit()">
                                    <option value="">-- Choose Exam --</option>
                                    <option th:each="exam : ${exams}"
                                            th:value="${exam.examID}"
                                            th:text="${exam.name}"
                                            th:selected="${exam.examID == selectedExamId}">
                                    </option>
                                </select>
                            </div>
                        </form>
                    </div>
                </div>

             <!-- 4. Result Entry Form Section (Record မမှတ်ရသေးသူများအတွက်) -->
<div th:if="${form != null and !#lists.isEmpty(form.results)}">
    <hr class="my-5">
    <div class="card border-0 shadow-sm rounded-3 mb-5 bg-white">
        <div class="card-header bg-white py-3 border-0 d-flex justify-content-between align-items-center">
            <h5 class="fw-bold text-dark mb-0">
                <i class="bi bi-pencil-square me-2 text-primary"></i>Enter Exam Results (Pending Students)
            </h5>
        </div>
        <div class="card-body p-4">
            <form th:action="@{/teacher/exam-results/save}" th:object="${form}" method="post">
                <input type="hidden" th:field="*{examID}" />
                
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th style="width: 50px;">No</th>
                                <th>Student Name</th>
                                <th style="width: 200px;">Score</th>
                                <th>Remarks</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- 🟢 th:if ကို ဖြုတ်လိုက်ပါ -->
                            <tr th:each="item, stat : *{results}">
                                <td th:text="${stat.count}">1</td>
                                <td>
                                    <input type="hidden" th:field="*{results[__${stat.index}__].userID}" />
                                    <span class="fw-semibold text-dark" th:text="${item.studentName}">Student Name</span>
                                </td>
                                <td>
                                    <input type="number" step="0.01" class="form-control rounded-2" 
                                           placeholder="0.00" 
                                           th:field="*{results[__${stat.index}__].score}" />
                                </td>
                                <td>
                                    <input type="text" class="form-control rounded-2" 
                                           placeholder="Optional feedback..." 
                                           th:field="*{results[__${stat.index}__].remarks}" />
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="d-flex justify-content-end mt-4">
                    <button type="submit" class="btn btn-primary px-4 rounded-3">
                        <i class="bi bi-check-circle me-2"></i>Save Results
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
<!-- 5. Result Review Section (Record မှတ်ပြီးသားသူများအတွက်) -->
<div th:if="${results != null}">
    <hr class="my-5">
    <h5 class="fw-bold text-secondary mb-3">
        <i class="bi bi-file-earmark-bar-graph me-2"></i>Graded Exam Results
    </h5>
    
    <div class="row g-3 mb-5">
        <!-- 🟢 score != null ဖြစ်ပြီးသား (Record ရှိပြီးသား) ကျောင်းသားများကိုပဲ ပြပါမည် -->
        <div class="col-md-6 col-xl-4" th:each="result : ${results}" th:if="${result.score != null}">
            <div class="card border-0 shadow-sm rounded-3 card-hover bg-white h-100">
                <div class="card-body p-4 d-flex flex-column">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div class="d-flex align-items-center">
                            <div class="bg-primary-subtle text-primary rounded-circle p-2 me-3 d-flex align-items-center justify-content-center" style="width:40px; height:40px;">
                                <i class="bi bi-person fw-bold"></i>
                            </div>
                            <div>
                                <h6 class="fw-bold text-dark mb-0" th:text="${result.studentName}">Student Name</h6>
                                <small class="text-muted" th:text="${result.gradedAt != null ? #temporals.format(result.gradedAt, 'yyyy-MM-dd HH:mm') : '-'}">2026-07-22 11:00</small>
                            </div>
                        </div>
                        <span class="badge rounded-pill bg-success-subtle text-success">
                            Completed
                        </span>
                    </div>

                    <div class="bg-light rounded-3 p-3 mb-3 flex-grow-1">
                        <div class="d-flex justify-content-between mb-1">
                            <span class="text-muted small">Score:</span>
                            <span class="fw-bold text-dark" th:text="${result.score}">85.5</span>
                        </div>
                        <div class="d-flex justify-content-between">
                            <span class="text-muted small">Remarks:</span>
                            <span class="text-dark small" th:text="${result.remarks != null ? result.remarks : 'None'}">Good job!</span>
                        </div>
                    </div>

                    <div>
                        <button type="button" 
                                class="btn btn-outline-primary btn-sm w-100 rounded-3"
                                th:data-id="${result.examResultID}"
                                th:data-examid="${result.examID}"
                                th:data-name="${result.studentName}"
                                th:data-score="${result.score}"
                                th:data-remarks="${result.remarks != null ? result.remarks : ''}"
                                onclick="openEditModal(this)">
                            <i class="bi bi-pencil-square me-1"></i>Edit Result
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>


    <!-- 🟢 3. Modal Box (th:if သမားများ၏ အပြင်ဘက် main အောက်တွင် သီးသန့်ထားပါသည်) -->
    <div class="modal fade" id="editResultModal" tabindex="-1" aria-labelledby="editResultModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title fw-bold" id="editResultModalLabel">
                        <i class="bi bi-pencil-square me-2"></i>Edit Exam Result
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form th:action="@{/teacher/exam-results/update}" method="post">
                    <div class="modal-body p-4">
                        <!-- Hidden Inputs -->
                       <input type="hidden" id="modalExamResultID" name="examResultID" />
    <input type="hidden" id="modalExamID" name="examID" />
                        <div class="mb-3">
                            <label class="form-label fw-bold">Student Name</label>
                            <input type="text" id="modalStudentName" class="form-control bg-light" readonly />
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Score</label>
                            <input type="number" step="0.01" id="modalScore" name="score" class="form-control" placeholder="Enter score" required />
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Remarks</label>
                            <input type="text" id="modalRemarks" name="remarks" class="form-control" placeholder="Optional feedback..." />
                        </div>
                    </div>
                    <div class="modal-footer bg-light">
                        <button type="button" class="btn btn-secondary rounded-3" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary rounded-3">
                            <i class="bi bi-save me-1"></i>Update Result
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

 			</main>

    </div>
</div>
    <!-- Footer Fragment ( Optional ) -->
    <div th:replace="~{fragment/footer :: footer}"></div>

    <!-- Bootstrap 5 JS Bundle -->
  <div th:replace="~{fragment/js :: js}"></div>

    <!-- Modal Toggle Script -->
    <script>
    function openEditModal(btn) {
        var id = btn.getAttribute('data-id');
        var examId = btn.getAttribute('data-examid');
        var name = btn.getAttribute('data-name');
        var score = btn.getAttribute('data-score');
        var remarks = btn.getAttribute('data-remarks');

        // Populate fields
        if (document.getElementById('modalExamResultID')) document.getElementById('modalExamResultID').value = id || '';
        if (document.getElementById('modalExamID')) document.getElementById('modalExamID').value = examId || '';
        if (document.getElementById('modalStudentName')) document.getElementById('modalStudentName').value = name || '';
        if (document.getElementById('modalScore')) document.getElementById('modalScore').value = score || '';
        if (document.getElementById('modalRemarks')) document.getElementById('modalRemarks').value = remarks || '';

        // Open Modal
        var modalElement = document.getElementById('editResultModal');
        if (modalElement) {
            var editModal = bootstrap.Modal.getOrCreateInstance(modalElement);
            editModal.show();
        } else {
            alert("Error: id='editResultModal' ကို ရှာမတွေ့ပါ။");
        }
    }
    </script>
</body>
</html>
