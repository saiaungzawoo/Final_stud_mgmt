<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragment/css :: css}"></head>

<body>

<div th:replace="~{teacher/teacher-dashboard :: teacherHeader}"></div>


<div class="container-fluid">

    <div class="row">


        <!-- Sidebar -->
        <div class="col-md-3 col-lg-2 p-0">

            <div th:replace="~{teacher/teacher-dashboard :: sidebar}">
            </div>

        </div>



        <!-- Content -->
        <div class="col-md-9 col-lg-10">


            <div class="container mt-4">


                <div class="d-flex justify-content-between align-items-center mb-4">


                    <h3>
                        Assignment Management
                    </h3>


                    <a th:href="@{/assignment/create}"
                       class="btn btn-primary">

                        Create Assignment

                    </a>


                </div>




                <!-- Assignment Table -->

                <table class="table table-bordered table-hover">


                   <thead class="table-primary">


                        <tr>

                            <th>
                                Course
                            </th>


                            <th>
                                Title
                            </th>


                            <th>
                                Description
                            </th>


                            <th>
                                Due Date
                            </th>


                            <th>
                                Score
                            </th>


                            <th>
                                Weight (%)
                            </th>


                            <th>
                                Status
                            </th>


                            <th>
                                Action
                            </th>


                        </tr>


                    </thead>




                    <tbody>


                        <tr th:each="assignment : ${assignmentList}">


                            <td th:text="${assignment.courseName}">
                            </td>



                            <td th:text="${assignment.title}">
                            </td>




                            <td>

                                <span th:text="${assignment.description}">
                                </span>

                            </td>





                            <td>

                                <span th:text="${#temporals.format(assignment.dueDate,'dd-MM-yyyy HH:mm')}">
                                </span>

                            </td>





                            <td>

                                <span th:text="${assignment.maxScore}">
                                </span>

                            </td>





                            <td>

                                <span th:text="${assignment.weightPercent + '%'}">
                                </span>

                            </td>






                            <td>


                                <span class="badge bg-info"
                                      th:text="${assignment.status}">
                                </span>


                            </td>







                            <td>


                                <a class="btn btn-sm btn-warning"
                                   th:href="@{/assignment/edit/{id}(id=${assignment.assignmentID})}">

                                    Edit

                                </a>





                                <a class="btn btn-sm btn-danger"
                                   th:href="@{/assignment/delete/{id}(id=${assignment.assignmentID})}"
                                   onclick="return confirm('Delete this assignment?')">

                                    Delete

                                </a>



                            </td>



                        </tr>



                    </tbody>



                </table>




            </div>


        </div>



    </div>


</div>



</body>

</html>
