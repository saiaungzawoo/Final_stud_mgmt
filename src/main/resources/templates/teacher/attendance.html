<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">


<head th:replace="~{fragment/css :: css}"></head>


<body>


<div th:replace="~{teacher/teacher-dashboard :: teacherHeader}"></div>



<div class="container-fluid">

    <div class="row">


        <!-- Sidebar -->

        <div class="col-md-3 col-lg-2 p-0">

            <div th:replace="~{teacher/teacher-dashboard :: sidebar}">
            </div>

        </div>




        <!-- Main Content -->

        <main class="col-md-9 col-lg-10 p-4 bg-light min-vh-100">



            <div class="d-flex justify-content-between align-items-center mb-4">


                <div>

                    <h2 class="fw-bold mb-1">
                        Take Attendance
                    </h2>


                    <p class="text-muted mb-0">
                        Mark student attendance for this class.
                    </p>


                </div>



                <a th:href="@{/attendance/list}"
                   class="btn btn-outline-secondary">

                    <i class="bi bi-arrow-left"></i>
                    Back

                </a>


            </div>





            <form th:action="@{/attendance/save}"
                  th:object="${attendanceForm}"
                  method="post">



                <div class="card shadow-sm border-0">



                    <div class="card-header bg-white">


                        <h5 class="mb-0">

                            Student Attendance List

                        </h5>


                    </div>






                    <div class="card-body">


                        <div class="table-responsive">



                            <table class="table table-hover align-middle">



                                <thead class="table-light">


                                <tr>


                                    <th width="80">
                                        No
                                    </th>


                                    <th>
                                        Student Name
                                    </th>


                                    <th width="200">
                                        Status
                                    </th>


                                    <th>
                                        Remark
                                    </th>


                                </tr>


                                </thead>





                                <tbody>



                                <tr th:each="attendance,stat : *{attendances}">



                                    <td th:text="${stat.count}">
                                    </td>





                                    <td>


                                        <span class="fw-semibold"
                                              th:text="${attendance.studentName}">
                                        </span>



                                        <!-- Hidden Data -->


                                        <input type="hidden"
                                               th:field="*{attendances[__${stat.index}__].userID}">



                                        <input type="hidden"
                                               th:field="*{attendances[__${stat.index}__].scheduleID}">



                                    </td>






                                    <td>



                                        <select class="form-select"
                                                th:field="*{attendances[__${stat.index}__].status}">


                                            <option value="Present">
                                                Present
                                            </option>


                                            <option value="Absent">
                                                Absent
                                            </option>


                                            <option value="Late">
                                                Late
                                            </option>


                                            <option value="Excused">
                                                Excused
                                            </option>



                                        </select>



                                    </td>






                                    <td>


                                        <input type="text"
                                               class="form-control"
                                               placeholder="Optional remark"
                                               th:field="*{attendances[__${stat.index}__].remarks}">


                                    </td>




                                </tr>







                                <tr th:if="${#lists.isEmpty(attendanceForm.attendances)}">


                                    <td colspan="4"
                                        class="text-center text-muted py-5">


                                        No students found.


                                    </td>


                                </tr>





                                </tbody>



                            </table>



                        </div>


                    </div>






                    <div class="card-footer bg-white text-end">


                        <button type="submit"
                                class="btn btn-success px-4">


                            <i class="bi bi-check-circle"></i>

                            Save Attendance


                        </button>


                    </div>





                </div>



            </form>





        </main>


    </div>


</div>





<div th:replace="~{fragment/footer :: footer}"></div>

<div th:replace="~{fragment/js :: js}"></div>



</body>

</html>
