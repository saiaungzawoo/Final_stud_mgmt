<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragment/css :: css}"></head>

<body class="bg-light">


<div th:replace="~{teacher/teacher-dashboard :: teacherHeader}"></div>


<div class="container mt-4">


    <div class="card shadow">


        <div class="card-header bg-primary text-white">

            <h4 class="mb-0">
                <i class="bi bi-pencil-square me-2"></i>
                Edit Announcement
            </h4>

        </div>



        <div class="card-body">


            <form th:action="@{/announcement/update}"
                  th:object="${announcement}"
                  method="post">


                <!-- Announcement ID -->
                <input type="hidden"
                       th:field="*{announcementID}">


                <!-- Keep Course ID -->
                <input type="hidden"
                       th:field="*{courseID}">



                <!-- Title -->
                <div class="mb-3">

                    <label class="form-label fw-bold">
                        Title
                    </label>

                    <input type="text"
                           class="form-control"
                           th:field="*{title}"
                           required>

                </div>



                <!-- Content -->
                <div class="mb-3">

                    <label class="form-label fw-bold">
                        Content
                    </label>


                    <textarea class="form-control"
                              rows="5"
                              th:field="*{content}"
                              required>
                    </textarea>

                </div>




                <!-- Target Type -->
                <div class="mb-3">

                    <label class="form-label fw-bold">
                        Target
                    </label>


                    <select class="form-select"
                            th:field="*{targetType}">


                        <option value="ALL">
                            All
                        </option>

                        <option value="ALL_STUDENTS">
                            All Students
                        </option>

                        <option value="ALL_TEACHERS">
                            All Teachers
                        </option>


                    </select>

                </div>




                <!-- Priority -->
                <div class="mb-3">

                    <label class="form-label fw-bold">
                        Priority
                    </label>


                    <select class="form-select"
                            th:field="*{priority}">


                        <option value="Low">
                            Low
                        </option>

                        <option value="Normal">
                            Normal
                        </option>

                        <option value="High">
                            High
                        </option>

                        <option value="Urgent">
                            Urgent
                        </option>


                    </select>


                </div>




                <!-- Expiry Date -->
                <div class="mb-3">

                    <label class="form-label fw-bold">
                        Expiry Date
                    </label>


                  <input type="datetime-local"
       class="form-control"
       name="expiryDate"
       th:value="${#temporals.format(announcement.expiryDate, 'yyyy-MM-dd''T''HH:mm')}">
                </div>




                <!-- Published -->
                <div class="form-check mb-3">


                    <input class="form-check-input"
                           type="checkbox"
                           th:field="*{published}">


                    <label class="form-check-label">

                        Published

                    </label>


                </div>




                <button type="submit"
                        class="btn btn-primary">

                    <i class="bi bi-save me-1"></i>
                    Update

                </button>



                <a th:href="@{/announcement/list/{id}(id=${announcement.courseID})}"
                   class="btn btn-secondary ms-2">

                    Cancel

                </a>



            </form>


        </div>


    </div>


</div>


</body>
</html>
