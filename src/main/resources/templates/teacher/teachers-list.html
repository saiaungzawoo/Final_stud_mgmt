<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Teacher List</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>


<body>
<div class="d-flex justify-content-between align-items-center mt-5">
        <h2 class="text-center mb-4">Teacher List</h2>

        <a th:href="@{/users/forms}" class="btn btn-success">
            <i class="bi bi-plus-circle"></i> +Add Teacher
        </a>
    </div>

    <table class="table table-bordered table-hover">

        <thead class="table-primary">
<!-- <div class="container mt-5">

    <h2 class="text-center mb-4">
        Teacher List
    </h2>

<a th:href="@{/users/forms}"
   class="btn btn-success">
    + Add Teacher
</a>

    <table class="table table-bordered table-hover">

        <thead class="table-primary">
 -->
        <tr>
           <!--  <th>User ID</th> -->
          
            <th>Photo</th>
            <!-- <th>Role ID</th> -->
            <th>Name</th>
            <th>Email</th>
            <th>Password</th>
            <th>Phone No</th>
            <th>Address</th>
            <th>Date of Birth</th>
            <th>Gender</th>
            <th>Created At</th>
            <th>Status</th>
            <th>Profile</th>
        </tr>

        </thead>



        <tbody>


        <tr th:each="teacher : ${teacherList}">


            <!-- UUID -->
           <!--  <td th:text="${teacher.userID}">
                user-id
            </td> -->



            <!-- Image -->
            <td>

                <img th:if="${teacher.profileImage != null}"
                     th:src="@{'/'+${teacher.profileImage}}"
                     width="70"
                     height="70"
                     class="rounded-circle">


                <span th:unless="${teacher.profileImage != null}">
                    No Image
                </span>

            </td>




        <!--     <td th:text="${teacher.roleID}">
                role-id
            </td>

 -->

            <td th:text="${teacher.name}">
                Name
            </td>



            <td th:text="${teacher.email}">
                Email
            </td>



            <td>
                ********
            </td>




            <td th:text="${teacher.phoneNo}">
                Phone
            </td>




            <td th:text="${teacher.address}">
                Address
            </td>




            <td th:text="${teacher.dob}">
                DOB
            </td>




            <td th:text="${teacher.gender}">
                Gender
            </td>




            <td th:text="${teacher.createdAt}">
                Created
            </td>




            <td>

                <span th:if="${teacher.isActive == 1}"
                      class="badge bg-success">

                    Active

                </span>


                <span th:unless="${teacher.isActive == 1}"
                      class="badge bg-danger">

                    Inactive

                </span>


            </td>




            <td>

                <a class="btn btn-primary btn-sm"
                   th:href="@{/users/getbyid(id=${teacher.userID})}">

                    View

                </a>


            </td>


        </tr>


        </tbody>


    </table>


</div>


</body>

</html>
