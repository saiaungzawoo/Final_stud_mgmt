<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">


<head th:replace="~{fragment/css :: css}"></head>


<body>


<div th:replace="~{teacher/teacher-dashboard :: teacherHeader}"></div>


<div class="container-fluid">

<div class="row">


<!-- Sidebar -->
<div class="col-md-3 col-lg-2 p-0">

<div th:replace="~{teacher/teacher-dashboard :: sidebar}">
</div>

</div>



<!-- Content -->
<div class="col-md-9 col-lg-10">


<div class="container mt-4">



<div class="card shadow-sm">


   <div class="card-header bg-primary text-white">

    <h4 class="mb-0">
        Edit Assignment
    </h4>

</div>


<div class="card-body">


<form th:action="@{/assignment/update}"
      th:object="${assignment}"
      method="post">


<input type="hidden"
       th:field="*{assignmentID}">



<!-- Course -->

<div class="mb-3">

<label class="form-label">
Course
</label>


<select class="form-select"
        th:field="*{courseID}">


<option value="">
-- Select Course --
</option>


<option th:each="course : ${courseList}"
        th:value="${course.courseId}"
        th:text="${course.name}">
</option>


</select>


</div>




<!-- Assignment Title -->

<div class="mb-3">


<label class="form-label">
Assignment Title
</label>


<input type="text"
       class="form-control"
       th:field="*{title}">


</div>




<!-- Description -->

<div class="mb-3">


<label class="form-label">
Description
</label>


<textarea class="form-control"
          rows="5"
          th:field="*{description}">
</textarea>


</div>





<!-- Max Score -->

<div class="mb-3">


<label class="form-label">
Maximum Score
</label>


<input type="number"
       step="0.01"
       class="form-control"
       th:field="*{maxScore}">


</div>






<!-- Weight -->

<div class="mb-3">


<label class="form-label">
Weight Percent
</label>


<input type="number"
       step="0.01"
       class="form-control"
       th:field="*{weightPercent}">


</div>







<!-- Due Date -->

<div class="mb-3">


<label class="form-label">
Due Date
</label>


<input type="datetime-local"
       class="form-control"
       name="dueDate"
       th:value="${assignment.dueDate != null ? #temporals.format(assignment.dueDate,'yyyy-MM-dd''T''HH:mm') : ''}">

</div>






<!-- Status -->

<div class="mb-3">


<label class="form-label">
Status
</label>


<select class="form-select"
        th:field="*{status}">


<option th:each="status : ${statusList}"
        th:value="${status}"
        th:text="${status}">
</option>


</select>


</div>







<div class="text-end">


<a th:href="@{/assignment/list(courseID=${assignment.courseID})}"
   class="btn btn-secondary">

Cancel

</a>




<button type="submit"
        class="btn btn-warning">

Update Assignment

</button>


</div>



</form>


</div>


</div>



</div>


</div>



</div>

</div>



<div th:replace="~{fragment/footer :: footer}"></div>

<div th:replace="~{fragment/js :: js}"></div>


</body>

</html>
