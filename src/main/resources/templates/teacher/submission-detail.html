<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">


<head th:replace="~{fragment/css :: css}"></head>


<body class="bg-light">


<!-- Teacher Header -->
<div th:replace="~{teacher/teacher-dashboard :: teacherHeader}">
</div>



<div class="container-fluid">

    <div class="row">


        <div class="col-md-12 p-4">


            <div class="card shadow">


                <div class="card-header bg-primary text-white">

                    <h4 class="mb-0">

                        <i class="bi bi-file-earmark-check"></i>
                        Submission Detail

                    </h4>

                </div>



                <div class="card-body">


                    <div class="row">


                        <!-- Student Information -->

                        <div class="col-md-6">


                            <h5 class="mb-3">
                                Student Information
                            </h5>


                            <p>
                                <strong>Name:</strong>

                                <span th:text="${submission.studentName}">
                                    Student Name
                                </span>
                            </p>


                            <p>
                                <strong>Assignment:</strong>

                                <span th:text="${submission.assignmentTitle}">
                                    Assignment Title
                                </span>
                            </p>


                            <p>
                                <strong>Submitted Date:</strong>

                                <span th:text="${submission.submittedAt}">
                                    Date
                                </span>
                            </p>


                        </div>



                        <!-- Submission File -->

                        <div class="col-md-6">


                            <h5 class="mb-3">
                                Submitted File
                            </h5>


                            <div th:if="${submission.filePath != null}">


                                <a th:href="@{'/' + ${submission.filePath}}"
                                   class="btn btn-outline-primary">

                                    <i class="bi bi-download"></i>
                                    Download File

                                </a>


                            </div>


                            <div th:if="${submission.filePath == null}">

                                <span class="text-muted">
                                    No file submitted
                                </span>

                            </div>


                        </div>


                    </div>



                    <hr>



                    <!-- Student Answer -->

                    <div class="mb-4">


                        <h5>
                            Submission Text
                        </h5>


                        <div class="border rounded p-3 bg-light">

                            <span th:text="${submission.submissionText}">
                                Student Answer
                            </span>

                        </div>


                    </div>




                    <!-- Grade Section -->

                    <form th:action="@{/teacher/submission/grade}"
                          method="post">


                        <input type="hidden"
                               name="submissionID"
                               th:value="${submission.submissionID}">



                        <div class="row">


                            <div class="col-md-4">


                                <label class="form-label">
                                    Score
                                </label>


                                <input type="number"
                                       step="0.01"
                                       name="score"
                                       class="form-control"
                                       th:value="${submission.score}">

                            </div>


                        </div>




                        <div class="mt-3">


                            <label class="form-label">
                                Feedback
                            </label>


                            <textarea name="feedback"
                                      class="form-control"
                                      rows="4"
                                      th:text="${submission.feedback}">
                            </textarea>


                        </div>




                        <div class="mt-4">


                            <button type="submit"
                                    class="btn btn-success">

                                <i class="bi bi-check-circle"></i>
                                Save Grade

                            </button>



                            <a th:href="@{/teacher/submission/list/{id}(id=${submission.assignmentID})}"
                               class="btn btn-secondary">

                                Back

                            </a>


                        </div>


                    </form>


                </div>


            </div>


        </div>


    </div>

</div>





<div th:replace="~{fragment/footer :: footer}">
</div>



<div th:replace="~{fragment/js :: js}">
</div>



</body>

</html>
