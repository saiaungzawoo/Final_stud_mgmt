<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragment/css :: css}"></head>

<body class="bg-light">


<!-- Header -->
<div th:replace="~{teacher/teacher-dashboard :: teacherHeader}"></div>


<div class="container-fluid">

    <div class="row">


        <!-- Sidebar -->
        <div class="col-md-3 col-lg-2 p-0">

            <div th:replace="~{teacher/teacher-dashboard :: sidebar}">
            </div>

        </div>



        <!-- Content -->
        <div class="col-md-9 col-lg-10 p-4">


            <div class="card shadow-sm">


                <div class="card-header bg-primary text-white">

                    <h4 class="mb-0">

                        <i class="bi bi-megaphone me-2"></i>

                        Create Announcement

                    </h4>

                </div>



                <div class="card-body">


                    <form th:action="@{/announcement/save}"
                          th:object="${announcement}"
                          method="post">


                        <!-- Keep Course ID -->
                        <input type="hidden"
                               th:field="*{courseID}">



                        <!-- Title -->

                        <div class="mb-3">

                            <label class="form-label fw-bold">
                                Title
                            </label>


                            <input type="text"
                                   th:field="*{title}"
                                   class="form-control"
                                   placeholder="Enter announcement title"
                                   required>

                        </div>



                        <!-- Content -->

                        <div class="mb-3">

                            <label class="form-label fw-bold">
                                Content
                            </label>


                            <textarea th:field="*{content}"
                                      class="form-control"
                                      rows="5"
                                      placeholder="Write announcement content..."
                                      required>
                            </textarea>

                        </div>



                        <!-- Target Type -->

                        <div class="mb-3">

                            <label class="form-label fw-bold">
                                Target
                            </label>


                            <select th:field="*{targetType}"
                                    class="form-select">


                                <option value="ALL">
                                    All
                                </option>


                                <option value="ALL_STUDENTS">
                                    All Students
                                </option>


                                <option value="ALL_TEACHERS">
                                    All Teachers
                                </option>


                            </select>

                        </div>




                        <!-- Priority -->

                        <div class="mb-3">

                            <label class="form-label fw-bold">
                                Priority
                            </label>


                            <select th:field="*{priority}"
                                    class="form-select">


                                <option value="Low">
                                    Low
                                </option>


                                <option value="Normal">
                                    Normal
                                </option>


                                <option value="High">
                                    High
                                </option>


                                <option value="Urgent">
                                    Urgent
                                </option>


                            </select>

                        </div>




                        <!-- Expiry Date -->

                        <div class="mb-3">

                            <label class="form-label fw-bold">
                                Expiry Date
                            </label>


                            <input type="datetime-local"
                                   th:field="*{expiryDate}"
                                   class="form-control"
                                   required>

                        </div>




                        <!-- Publish -->

                        <div class="form-check mb-4">


                            <input type="checkbox"
                                   class="form-check-input"
                                   th:field="*{published}">


                            <label class="form-check-label">

                                Publish Now

                            </label>


                        </div>




                        <!-- Button -->

                        <button type="submit"
                                class="btn btn-primary">

                            <i class="bi bi-save me-1"></i>

                            Create Announcement

                        </button>



                        <a th:href="@{/announcement/list/{id}(id=${announcement.courseID})}"
                           class="btn btn-secondary ms-2">

                            Cancel

                        </a>



                    </form>


                </div>


            </div>


        </div>


    </div>


</div>



<div th:replace="~{fragment/footer :: footer}"></div>


</body>

</html>
