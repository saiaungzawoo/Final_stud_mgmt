<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragment/css :: css}"></head>


<body class="bg-light">


<div th:replace="~{teacher/teacher-dashboard :: teacherHeader}">
</div>



<div class="container-fluid">


<div class="row">


<!-- Sidebar -->
<div class="col-md-3 col-lg-2 p-0">

<div th:replace="~{teacher/teacher-dashboard :: sidebar}">
</div>

</div>



<!-- Content -->
<div class="col-md-9 col-lg-10">


<div class="container mt-4">


<div class="card shadow">


<div class="card-header bg-primary text-white">

<h4 class="mb-0">

<i class="bi bi-clipboard-data me-2"></i>

Exam Result List

</h4>

</div>



<div class="card-body">


<table class="table table-bordered table-hover">


<thead class="table-dark">

<tr>

<th>No</th>

<th>Student Name</th>

<th>Score</th>

<th>Remarks</th>

<th>Graded Date</th>

<th>Action</th>

</tr>

</thead>



<tbody>


<tr th:each="result, stat : ${results}">


<td th:text="${stat.count}"></td>


<td th:text="${result.studentName}"></td>


<td th:text="${result.score}"></td>


<td th:text="${result.remarks}"></td>


<td th:text="${#temporals.format(result.gradedAt,'dd-MM-yyyy HH:mm')}"></td>

<td>

<a th:href="@{/exam/result/edit/{id}(id=${result.examResultID})}"
   class="btn btn-warning btn-sm">

<i class="bi bi-pencil-square"></i>
Edit

</a>

</td>
</tr>


</tbody>



</table>


</div>


</div>


</div>


</div>


</div>


</div>



<div th:replace="~{fragment/footer :: footer}">
</div>


<div th:replace="~{fragment/js :: js}">
</div>



</body>

</html>
