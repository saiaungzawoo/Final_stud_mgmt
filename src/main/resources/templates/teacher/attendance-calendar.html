<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Attendance Calendar</title>

    <head th:replace="~{fragment/css :: css}"></head>

    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.18/index.global.min.css" rel="stylesheet">

    <style>
        #calendar{
            width:900px;
            max-width:100%;
            margin:auto;
            background:#fff;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.1);
        }
    </style>
</head>

<body>

<div th:replace="~{teacher/teacher-dashboard :: teacherHeader}"></div>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-3 col-lg-2 p-0">
            <div th:replace="~{teacher/teacher-dashboard :: sidebar}"></div>
        </div>

        <!-- Main -->
     <main class="col-md-9 col-lg-10 p-4 bg-light min-vh-100">

    <div class="container-fluid">

        <div class="row mb-4">
            <div class="col">
                <h2 class="fw-bold">Attendance Calendar</h2>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-12">

                <div class="card shadow-sm border-0">
                    <div class="card-body">

                        <div id="calendar"></div>

                    </div>
                </div>

            </div>
        </div>

    </div>

</main>
    </div>
</div>

<div th:replace="~{fragment/footer :: footer}"></div>
<div th:replace="~{fragment/js :: js}"></div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.18/index.global.min.js"></script>

<!-- Thymeleaf Variable -->
<script th:inline="javascript">

const schedules = /*[[${scheduleList}]]*/ [];



let events = schedules.map(function(schedule){


    let color = "#808080"; 
    // default Gray (attendance မမှတ်ရသေး)


    if(schedule.attendanceStatus === "COMPLETED"){

        color = "#28a745"; 
        // Green (လူအကုန်မှတ်ပြီး)

    }
    else if(schedule.attendanceStatus === "PARTIAL"){

        color = "#90EE90"; 
        // Light Green (တချို့ပဲမှတ်ပြီး)

    }
    else if(schedule.attendanceStatus === "NOT_MARKED"){

        color = "#808080";
        // Gray (မမှတ်ရသေး)

    }



    return {


        id:schedule.scheduleId,


        title:schedule.topic,


        start:schedule.scheduleDate,



        backgroundColor:color,


        borderColor:color,



        extendedProps:{


            startTime:schedule.startTime,


            endTime:schedule.endTime,


            room:schedule.room


        },



        url:
        "/attendance/mark/"
        + schedule.courseId
        + "/"
        + schedule.scheduleId


    };


});





document.addEventListener(
"DOMContentLoaded",
function(){



let calendar =
new FullCalendar.Calendar(

document.getElementById("calendar"),


{


initialView:"dayGridMonth",


height:650,



events:events,





eventContent:function(arg){



let time =
arg.event.extendedProps.startTime
+
" - "
+
arg.event.extendedProps.endTime;



let room =
arg.event.extendedProps.room;



return {


html:

`
<div class="schedule-box">


<div class="schedule-time">

<i class="bi bi-clock"></i>

${time}

</div>



<div class="schedule-topic">

${arg.event.title}

</div>



<div class="schedule-room">

${room ? "Room "+room : ""}

</div>



</div>
`

};



},






eventClick:function(info){



info.jsEvent.preventDefault();



// ဒီနေ့ပဲ Attendance မှတ်ခွင့်ပြု

let today = new Date();

today.setHours(0,0,0,0);



let eventDate = new Date(info.event.start);

eventDate.setHours(0,0,0,0);



if(eventDate.getTime() !== today.getTime()){


    alert("Attendance can only be taken for today's class.");

    return;


}




window.location.href = info.event.url;



}





}

);



calendar.render();



});

</script>
</body>
</html>
