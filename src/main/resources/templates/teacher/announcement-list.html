<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragment/css :: css}"></head>

<body class="bg-light">


<!-- Teacher Header -->
<div th:replace="~{teacher/teacher-dashboard :: teacherHeader}"></div>


<div class="container-fluid">

    <div class="row">


        <!-- Sidebar -->
        <div class="col-md-3 col-lg-2 p-0">
            <div th:replace="~{teacher/teacher-dashboard :: sidebar}"></div>
        </div>


        <!-- Content -->
        <div class="col-md-9 col-lg-10 p-4">


            <div class="d-flex justify-content-between align-items-center mb-4">

                <div>
                    <h3 class="fw-bold">
                        <i class="bi bi-megaphone-fill me-2"></i>
                        Announcement
                    </h3>

                    <p class="text-muted mb-0">
                        Course Announcement List
                    </p>
                </div>


                <!-- Create Button -->
                <a th:href="@{/announcement/create/{id}(id=${courseID})}"
                   class="btn btn-primary">

                    <i class="bi bi-plus-circle me-2"></i>
                    Create Announcement

                </a>

            </div>



            <div class="card shadow-sm">


                <div class="card-header bg-primary text-white">

                    <h5 class="mb-0">
                        Announcement List
                    </h5>

                </div>



                <div class="card-body">


                    <div th:if="${#lists.isEmpty(announcementList)}"
                         class="text-center text-muted p-4">

                        <i class="bi bi-info-circle fs-3"></i>

                        <p class="mt-2">
                            No announcement found for this course.
                        </p>

                    </div>



                    <div class="table-responsive"
                         th:unless="${#lists.isEmpty(announcementList)}">


                        <table class="table table-bordered table-hover align-middle">


                            <thead class="table-light">

                                <tr>

                                    <th>No</th>

                                    <th>Title</th>

                                    <th>Priority</th>

                                    <th>Status</th>

                                    <th>Publish Date</th>

                                    <th>Expire Date</th>

                                    <th width="180">
                                        Action
                                    </th>

                                </tr>

                            </thead>



                            <tbody>


                                <tr th:each="a, stat : ${announcementList}">


                                    <td th:text="${stat.count}">
                                        1
                                    </td>



                                    <td>

                                        <strong th:text="${a.title}">
                                            Title
                                        </strong>

                                    </td>



                                    <td>

                                        <span class="badge bg-warning text-dark"
                                              th:text="${a.priority}">
                                            High
                                        </span>

                                    </td>



                                    <td>

                                        <span th:if="${a.published}"
                                              class="badge bg-success">

                                            Published

                                        </span>


                                        <span th:unless="${a.published}"
                                              class="badge bg-secondary">

                                            Draft

                                        </span>

                                    </td>




                                    <td th:text="${#temporals.format(a.publishDate,
                                            'yyyy-MM-dd HH:mm')}">

                                        2026-07-18 10:00

                                    </td>



                                    <td th:text="${#temporals.format(a.expiryDate,
                                            'yyyy-MM-dd HH:mm')}">

                                        2026-07-20 10:00

                                    </td>



                                    <td>


                                        <a th:href="@{/announcement/view/{id}(id=${a.announcementID})}"
                                           class="btn btn-sm btn-info text-white">

                                            <i class="bi bi-eye"></i>

                                        </a>



                                        <a th:href="@{/announcement/edit/{id}(id=${a.announcementID})}"
                                           class="btn btn-sm btn-warning">

                                            <i class="bi bi-pencil"></i>

                                        </a>



                                    </td>


                                </tr>


                            </tbody>


                        </table>


                    </div>


                </div>


            </div>


        </div>


    </div>


</div>



</body>
</html>
