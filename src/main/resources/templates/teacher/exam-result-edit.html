<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragment/css :: css}"></head>


<body class="bg-light">


<div th:replace="~{teacher/teacher-dashboard :: teacherHeader}">
</div>



<div class="container-fluid">


<div class="row">


<!-- Sidebar -->

<div class="col-md-3 col-lg-2 p-0">

<div th:replace="~{teacher/teacher-dashboard :: sidebar}">
</div>

</div>




<!-- Main Content -->

<div class="col-md-9 col-lg-10">


<div class="container mt-4">


<div class="card shadow">


<div class="card-header bg-primary text-white">

<h4 class="mb-0">

<i class="bi bi-pencil-square me-2"></i>

Update Exam Result

</h4>

</div>




<div class="card-body">
<div class="alert alert-danger"
     th:if="${error}"
     th:text="${error}">
</div>

<form th:action="@{/exam/result/update}"
      method="post"
      th:object="${result}">



<input type="hidden"
       th:field="*{examResultID}">


<input type="hidden"
       th:field="*{examID}">


<input type="hidden"
       th:field="*{userID}">





<div class="mb-3">

<label class="form-label">
Student Name
</label>


<input type="text"
       class="form-control"
       th:value="${result.studentName}"
       readonly>

</div>





<div class="mb-3">

<label class="form-label">
Score
</label>


<input type="number"
       class="form-control"
       step="0.01"
       th:field="*{score}">
       
       <div class="text-danger"
     th:if="${#fields.hasErrors('score')}"
     th:errors="*{score}">
</div>

</div>





<div class="mb-3">

<label class="form-label">
Remarks
</label>


<textarea class="form-control"
          rows="3"
          th:field="*{remarks}">
</textarea>


</div>





<div class="text-end">


<button type="submit"
        class="btn btn-success">


<i class="bi bi-save me-1"></i>

Update


</button>



<a th:href="@{/exam/result/view/{id}(id=${result.examID})}"
   class="btn btn-secondary">

Cancel

</a>



</div>



</form>


</div>


</div>


</div>


</div>


</div>


</div>



<div th:replace="~{fragment/footer :: footer}">
</div>


<div th:replace="~{fragment/js :: js}">
</div>



</body>

</html>
