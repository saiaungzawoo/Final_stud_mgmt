<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Scholarship</title>
    <head th:replace="~{fragment/css :: css}"></head>
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom Form & Responsive UI Styles -->
    <style>
        .scholarship-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        /* Card Icon Animation */
        .scholarship-card:hover .animated-icon {
            animation: wiggle 0.5s ease-in-out infinite alternate;
        }
        /* Hover Effect for Buttons */
        .hover-btn {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .hover-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1) !important;
        }

        @keyframes wiggle {
            0% { transform: rotate(-10deg); }
            100% { transform: rotate(10deg); }
        }
    </style>
</head>
<body class="bg-light">
 <!-- ADMIN HEADER -->
            <header>
                <div th:replace="~{fragment/admin-header :: adminHeader}"></div>
            </header>

<div class="container-fluid min-vh-100 p-0">
    <div class="row g-0 min-vh-100">

        <!-- DESKTOP SIDEBAR -->
        <aside class="col-md-3 col-lg-2 bg-dark text-white d-none d-md-block border-end">
            <div th:replace="~{fragment/admin-sidebar :: adminSidebar}"></div>
        </aside>

        <!-- MOBILE SIDEBAR (OFFCANVAS) -->
        <div class="offcanvas offcanvas-start bg-dark text-white d-md-none" tabindex="-1" id="mobileSidebar" aria-labelledby="mobileSidebarLabel">
            <div class="offcanvas-header border-bottom border-secondary">
                <h5 class="offcanvas-title text-white" id="mobileSidebarLabel">Admin Menu</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
            </div>
            <div class="offcanvas-body p-0">
                <div th:replace="~{fragment/admin-sidebar :: adminSidebar}"></div>
            </div>
        </div>

        <!-- MAIN CONTENT CONTAINER -->
        <main class="col-12 col-md-9 col-lg-10 d-flex flex-column min-vh-100">

            <!-- MOBILE TOGGLE HEADER BAR -->
            <div class="d-md-none bg-dark text-white p-2 d-flex justify-content-between align-items-center shadow-sm">
                <button class="btn btn-outline-light btn-sm" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">
                    <i class="bi bi-list fs-5"></i> Menu
                </button>
                <span class="fw-semibold">Admin Panel</span>
            </div>

           
            <!-- FORM CONTENT -->
            <section class="container py-4 py-md-5 flex-grow-1">
                <div class="row justify-content-center">
                    <div class="col-12 col-sm-11 col-md-10 col-lg-8">

                        <!-- Scholarship Form Card -->
                        <div class="card shadow-sm border-0 rounded-4 overflow-hidden scholarship-card">
                            
                            <!-- Card Header -->
                            <div class="card-header bg-primary text-white text-center py-4 border-0">
                                <div class="mb-2">
                                    <i class="bi bi-mortarboard animated-icon d-inline-block fs-1"></i>
                                </div>
                                <h3 class="mb-0 fw-bold fs-4 fs-md-3">Add Scholarship</h3>
                                <p class="text-white-50 small mb-0 mt-1">Create a new scholarship program and specify criteria details</p>
                            </div>

                            <!-- Card Body -->
                            <div class="card-body p-3 p-sm-4 p-md-5 bg-white">

                                <form th:action="@{/admin/save}"
                                      th:object="${scholarship}"
                                      method="post">

                                    <div class="row g-3 g-md-4">
                                        
                                        <!-- Course Selection -->
                                        <div class="col-12">
                                            <label class="form-label fw-semibold text-dark mb-2">
                                                <i class="bi bi-book me-1 text-primary"></i> Target Course
                                            </label>
                                            <select class="form-select rounded-3 p-2.5" th:field="${scholarship.courseID}">
                                                <option value="">Select Course</option>
                                                <option th:each="c : ${courses}"
                                                        th:value="${c.courseId}"
                                                        th:text="${c.name}">Course Name</option>
                                            </select>
                                        </div>

                                        <!-- Scholarship Name -->
                                        <div class="col-12">
                                            <label class="form-label fw-semibold text-dark mb-2">
                                                <i class="bi bi-bookmark-star me-1 text-primary"></i> Scholarship Name
                                            </label>
                                            <input type="text" class="form-control rounded-3 p-2.5" th:field="*{scholarshipName}" placeholder="Enter scholarship name">
                                            <div class="text-danger small mt-1" th:errors="*{scholarshipName}"></div>
                                        </div>

                                        <!-- Description -->
                                        <div class="col-12">
                                            <label class="form-label fw-semibold text-dark mb-2">
                                                <i class="bi bi-card-text me-1 text-primary"></i> Description
                                            </label>
                                            <textarea class="form-control rounded-3 p-3" rows="4" th:field="*{description}" placeholder="Enter scholarship offering rules, conditions or descriptions..."></textarea>
                                            <div class="text-danger small mt-1" th:errors="*{description}"></div>
                                        </div>

                                        <!-- Discount Type -->
                                        <div class="col-12 col-md-6">
                                            <label class="form-label fw-semibold text-dark mb-2">
                                                <i class="bi bi-tags me-1 text-primary"></i> Discount Type
                                            </label>
                                            <select class="form-select rounded-3 p-2.5" th:field="*{discountType}">
                                                <option value="">Select Discount Type</option>
                                                <option value="Percentage">Percentage (%)</option>
                                                <option value="Fixed Amount">Fixed Amount</option>
                                            </select>
                                            <div class="text-danger small mt-1" th:errors="*{discountType}"></div>
                                        </div>

                                        <!-- Discount Value -->
                                        <div class="col-12 col-md-6">
                                            <label class="form-label fw-semibold text-dark mb-2">
                                                <i class="bi bi-cash-coin me-1 text-primary"></i> Discount Value
                                            </label>
                                            <input type="number" step="0.01" class="form-control rounded-3 p-2.5" th:field="*{discountValue}" placeholder="Enter discount value">
                                            <div class="text-danger small mt-1" th:errors="*{discountValue}"></div>
                                        </div>

                                        <!-- Max Recipients -->
                                        <div class="col-12 col-md-6">
                                            <label class="form-label fw-semibold text-dark mb-2">
                                                <i class="bi bi-people me-1 text-primary"></i> Max Recipients
                                            </label>
                                            <input type="number" class="form-control rounded-3 p-2.5" th:field="*{maxRecipients}" placeholder="Enter maximum recipients">
                                            <div class="text-danger small mt-1" th:errors="*{maxRecipients}"></div>
                                        </div>

                                        <!-- Deadline -->
                                        <div class="col-12 col-md-6">
                                            <label class="form-label fw-semibold text-dark mb-2">
                                                <i class="bi bi-calendar-x me-1 text-primary"></i> Application Deadline
                                            </label>
                                            <input type="date" class="form-control rounded-3 p-2.5" th:field="*{applicationDeadline}">
                                            <div class="text-danger small mt-1" th:errors="*{applicationDeadline}"></div>
                                        </div>

                                        <!-- Status -->
                                        <div class="col-12">
                                            <label class="form-label fw-semibold text-dark mb-2">
                                                <i class="bi bi-toggle-on me-1 text-primary"></i> Initial Status
                                            </label>
                                            <select class="form-select rounded-3 p-2.5 w-100 w-sm-auto" th:field="*{isActive}" style="max-width: 250px;">
                                                <option value="1">Active</option>
                                                <option value="0">Inactive</option>
                                            </select>
                                        </div>

                                    </div>

                                    <hr class="text-muted opacity-25 my-4">

                                    <!-- Action Buttons -->
                                    <div class="d-flex flex-column-reverse flex-sm-row justify-content-end gap-2">
                                        <a th:href="@{/admin/list}" class="btn btn-outline-secondary px-4 py-2 rounded-pill hover-btn w-100 w-sm-auto text-center">
                                            Cancel
                                        </a>
                                        <button type="submit" class="btn btn-primary px-4 py-2 rounded-pill shadow-sm hover-btn w-100 w-sm-auto">
                                            Save Scholarship <i class="bi bi-check2-circle ms-1"></i>
                                        </button>
                                    </div>

                                </form>
                            </div>

                        </div> <!-- /card -->
                    </div>
                </div>
            </section>

            

        </main> <!-- /main content col -->
    </div> <!-- /row -->
</div> <!-- /container-fluid -->
<!-- FOOTER -->
            <footer class="mt-auto">
                <div th:replace="~{fragment/footer :: footer}"></div>
            </footer>
<div th:replace="~{fragment/js :: js}"></div>

</body>
</html>
