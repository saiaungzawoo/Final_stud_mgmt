<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Teacher Account - Admin Dashboard</title>

    <!-- Global CSS Fragment -->
    <th:block th:replace="~{fragment/css :: css}"></th:block>

    <!-- Bootstrap Icons & Google Fonts -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">

    <!-- Custom Admin Layout Styles -->
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #f8fafc;
            overflow-x: hidden;
        }

        .main-wrapper {
            min-height: 100vh;
        }

        .form-card {
            transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid #e2e8f0;
        }

        .hover-btn {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .hover-btn:hover {
            transform: translateY(-1px);
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

    <!-- ADMIN HEADER FRAGMENT -->
    <div th:replace="~{fragment/admin-header :: adminHeader}"></div>

    <!-- MAIN WRAPPER (SIDEBAR + CONTENT) -->
    <div class="d-flex flex-column flex-lg-row flex-grow-1">

        <!-- ADMIN SIDEBAR FRAGMENT -->
        <div th:replace="~{fragment/admin-sidebar :: adminSidebar}"></div>

        <!-- MAIN CONTENT AREA -->
        <div class="flex-grow-1 d-flex flex-column main-wrapper overflow-y-auto">

            <!-- PAGE CONTENT -->
            <main class="container-fluid p-3 p-sm-4 p-lg-5 flex-grow-1">

                <!-- Page Header Title Area -->
                <div class="d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center gap-3 mb-4">
                    <div>
                        <h2 class="fw-bold text-dark mb-1 fs-3 fs-md-2 d-flex align-items-center gap-2">
                            <i class="bi bi-person-plus text-primary d-inline-block"></i>
                            Create Teacher Account
                        </h2>
                        <p class="text-muted small mb-0">Fill in the details below to register a new teacher in the portal.</p>
                    </div>

                    <a th:href="@{/users/teacherLists}" class="btn btn-outline-secondary px-4 py-2 rounded-pill shadow-sm hover-btn fw-semibold w-100 w-sm-auto text-center">
                        <i class="bi bi-arrow-left me-1"></i> Back to List
                    </a>
                </div>

                <!-- Form Card Wrapper -->
                <div class="row justify-content-center">
                    <div class="col-lg-8 col-xl-7">
                        <div class="card bg-white shadow-sm border-0 rounded-4 overflow-hidden form-card mb-4">
                            <div class="card-header bg-primary text-white p-3 px-4">
                                <h5 class="mb-0 fw-semibold">
                                    <i class="bi bi-card-heading me-2"></i> Registration Form
                                </h5>
                            </div>

                            <div class="card-body p-4 p-md-5">

                                <!-- Alert Messages -->
                                <div class="alert alert-success alert-dismissible fade show rounded-3" role="alert" th:if="${success}" th:text="${success}">
                                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                                </div>
                                <div class="alert alert-danger alert-dismissible fade show rounded-3" role="alert" th:if="${error}" th:text="${error}">
                                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                                </div>

                                <form th:action="@{/users/teacherRegister}" th:object="${userObj}" method="post" enctype="multipart/form-data">
                                    
                                    <div class="row g-3">
                                        <!-- Name -->
                                        <div class="col-md-6">
                                            <label class="form-label fw-semibold text-dark">Full Name</label>
                                            <div class="input-group">
                                                <span class="input-group-text bg-light text-muted"><i class="bi bi-person"></i></span>
                                                <input type="text" class="form-control" th:field="*{name}" placeholder="Enter full name">
                                            </div>
                                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                                        </div>

                                        <!-- Email -->
                                        <div class="col-md-6">
                                            <label class="form-label fw-semibold text-dark">Email Address</label>
                                            <div class="input-group">
                                                <span class="input-group-text bg-light text-muted"><i class="bi bi-envelope"></i></span>
                                                <input type="email" class="form-control" th:field="*{email}" placeholder="Enter email address">
                                            </div>
                                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                                        </div>

                                        <!-- Password -->
                                        <div class="col-md-6">
                                            <label class="form-label fw-semibold text-dark">Password</label>
                                            <div class="input-group">
                                                <span class="input-group-text bg-light text-muted"><i class="bi bi-lock"></i></span>
                                                <input type="password" class="form-control" th:field="*{password}" placeholder="Create password">
                                            </div>
                                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                                        </div>

                                        <!-- Phone -->
                                        <div class="col-md-6">
                                            <label class="form-label fw-semibold text-dark">Phone Number</label>
                                            <div class="input-group">
                                                <span class="input-group-text bg-light text-muted"><i class="bi bi-telephone"></i></span>
                                                <input type="text" class="form-control" th:field="*{phoneNo}" placeholder="Enter phone number">
                                            </div>
                                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('phoneNo')}" th:errors="*{phoneNo}"></div>
                                        </div>

                                        <!-- DOB -->
                                        <div class="col-md-6">
                                            <label class="form-label fw-semibold text-dark">Date of Birth</label>
                                            <input type="date" class="form-control" th:field="*{dob}">
                                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('dob')}" th:errors="*{dob}"></div>
                                        </div>

                                        <!-- Gender -->
                                        <div class="col-md-6">
                                            <label class="form-label fw-semibold text-dark">Gender</label>
                                            <select class="form-select" th:field="*{gender}">
                                                <option value="">Select Gender</option>
                                                <option value="Male">Male</option>
                                                <option value="Female">Female</option>
                                                <option value="Other">Other</option>
                                            </select>
                                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}"></div>
                                        </div>

                                        <!-- Profile Image -->
                                        <div class="col-12">
                                            <label class="form-label fw-semibold text-dark">Profile Image</label>
                                            <input type="file" name="file" accept="image/*" class="form-control">
                                            <div class="text-danger small mt-1" th:if="${fileError}" th:text="${fileError}"></div>
                                        </div>

                                        <!-- Address -->
                                        <div class="col-12">
                                            <label class="form-label fw-semibold text-dark">Address</label>
                                            <textarea class="form-control" rows="3" th:field="*{address}" placeholder="Enter full address..."></textarea>
                                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>
                                        </div>

                                        <!-- Submit & Cancel Buttons -->
                                        <div class="col-12 text-center pt-3 d-flex justify-content-center gap-2">
                                            <button type="submit" class="btn btn-primary px-4 py-2 rounded-pill shadow-sm hover-btn fw-semibold">
                                                <i class="bi bi-person-check me-1"></i> Create Teacher
                                            </button>
                                            <a th:href="@{/users/teacherLists}" class="btn btn-light border px-4 py-2 rounded-pill hover-btn fw-semibold text-secondary">
                                                Cancel
                                            </a>
                                        </div>

                                    </div>
                                </form>

                            </div>
                        </div> <!-- /.card -->
                    </div>
                </div>

            </main>

           

        </div>
    </div>
 <!-- FOOTER FRAGMENT -->
            <footer class="mt-auto">
                <div th:replace="~{fragment/footer :: footer}"></div>
            </footer>
            
    <!-- Global JS Fragment -->
    <div th:replace="~{fragment/js :: js}"></div>

</body>

</html>
