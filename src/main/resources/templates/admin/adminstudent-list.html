<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student List</title>
    <head th:replace="~{fragment/css :: css}"></head>
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS Animation & Table UI Styles -->
    <style>
        .management-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .management-card:hover {
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08) !important;
        }
        /* Header Title Icon Hover Animation */
        .title-area:hover .animated-icon {
            animation: wiggle 0.5s ease-in-out infinite alternate;
        }
        /* Action Buttons Hover Effect */
        .hover-btn {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .hover-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1) !important;
        }
        /* Table Content Formatting */
        .table-responsive {
            white-space: nowrap;
        }
        .profile-img-placeholder {
            width: 45px;
            height: 45px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #e9ecef;
            color: #6c757d;
        }

        @keyframes wiggle {
            0% { transform: rotate(-10deg); }
            100% { transform: rotate(10deg); }
        }
    </style>
</head>
<body class="bg-light">

<div th:replace="~{fragment/header :: header}"></div>

<div class="container py-5">

    <!-- Header Control Title Area -->
    <div class="mb-4 title-area">
        <h2 class="fw-bold text-dark mb-1 d-flex align-items-center gap-2">
            <i class="bi bi-people-fill text-primary animated-icon d-inline-block"></i>
            Student Management
        </h2>
        <p class="text-muted small mb-0">View, monitor and manage registered student profiles and their account status</p>
    </div>

    <!-- Data Table Card -->
    <div class="card shadow-sm border-0 rounded-4 overflow-hidden management-card">
        <div class="card-body p-0">
            
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-primary text-white bg-primary">
                        <tr>
                            <th class="ps-4 py-3 text-center">No</th>
                            <th class="py-3 text-center">Profile</th>
                            <th class="py-3">Name</th>
                            <th class="py-3">Email</th>
                            <th class="py-3">Phone</th>
                            <th class="py-3">Gender</th>
                            <th class="py-3 text-center">Status</th>
                            <th class="pe-4 py-3 text-center">Action</th>
                        </tr>
                    </thead>

                    <tbody>
                        <!-- Empty State If No Students Available -->
                        <tr th:if="${#lists.isEmpty(students)}">
                            <td colspan="8" class="text-center py-5 text-muted">
                                <i class="bi bi-people fs-2 d-block mb-2 text-secondary"></i>
                                No student records found.
                            </td>
                        </tr>

                        <!-- Row Dynamic Fetch Loop -->
                        <tr th:each="student, stat : ${students}">
                            <td class="ps-4 text-center fw-medium text-secondary" th:text="${stat.count}">1</td>
                            
                            <!-- Profile Image Cell -->
                            <td class="text-center">
                                <img th:if="${student.profileImage != null}" 
                                     th:src="@{${student.profileImage}}" 
                                     width="45" height="45" 
                                     class="rounded-circle object-fit-cover border shadow-sm" alt="Student Profile">
                                
                                <div th:unless="${student.profileImage != null}" 
                                     class="rounded-circle profile-img-placeholder border shadow-sm">
                                    <i class="bi bi-person-fill fs-5"></i>
                                </div>
                            </td>

                            <td class="fw-semibold text-dark" th:text="${student.name}">Student Name</td>
                            <td th:text="${student.email}">student@email.com</td>
                            <td th:text="${student.phoneNumber}">+959...</td>
                            
                            <td>
                                <span class="badge bg-light text-dark border px-2.5 py-1.5 fw-medium" th:text="${student.gender}">Gender</span>
                            </td>

                            <!-- Status Badge -->
                            <td class="text-center">
                                <span th:if="${student.isActive == 1}" class="badge bg-success-subtle text-success px-2.5 py-1.5 border border-success-subtle rounded-pill">
                                    <i class="bi bi-check-circle-fill small me-1"></i> Active
                                </span>
                                <span th:if="${student.isActive == 0}" class="badge bg-danger-subtle text-danger px-2.5 py-1.5 border border-danger-subtle rounded-pill">
                                    <i class="bi bi-x-circle-fill small me-1"></i> Inactive
                                </span>
                            </td>

                            <!-- Action Buttons -->
                            <td class="pe-4 text-center">
                                <a th:href="@{/student/admin/student/detail/{id}(id=${student.userID})}" class="btn btn-sm btn-primary rounded-pill px-3 shadow-sm hover-btn">
                                    <i class="bi bi-search me-1"></i> View
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div> <!-- /table-responsive -->

        </div>
    </div> <!-- /card -->

</div>

<div th:replace="~{fragment/footer :: footer}"></div>
<div th:replace="~{fragment/js :: js}"></div>

</body>
</html>
