<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ace Inspiration</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        .ace-logo {
            font-size: 1.5rem;
            color: #0d6efd;
        }

        .ace-text {
            font-weight: 700;
            font-size: 1rem;
        }

        .ace-subtext {
            font-size: 0.75rem;
            color: gray;
        }

        .search-pill {
            position: relative;
            max-width: 500px;
            width: 100%;
        }

        .search-pill input {
            padding-left: 2rem;
        }

        .search-pill i {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: gray;
        }

        .category-menu {
            width: 350px;
        }
    </style>
</head>
<body>
<header th:fragment="adminHeader" class="teacher-header navbar navbar-expand-lg bg-white border-bottom px-3">
  <div class="container-fluid">
    <button class="btn btn-outline-secondary d-lg-none me-2" type="button"
            data-bs-toggle="offcanvas" data-bs-target="#teacherSidebar">
      <i class="bi bi-list"></i>
    </button>

    <a class="navbar-brand fw-bold" th:href="@{/admin/dashboard}">
     <span class="ace-logo">
              <i class="bi bi-mortarboard-fill"></i>
            </span>
      Ace Inspiration admin
    </a>

    <form class="d-none d-md-flex ms-auto me-3" role="search">
      <div class="input-group">
        <span class="input-group-text bg-light"><i class="bi bi-search"></i></span>
        <input class="form-control" type="search" placeholder="Search classes, students...">
      </div>
    </form>

    <div class="d-flex align-items-center gap-2">
      <a th:href="@{/teacher/announcements}" class="btn btn-light position-relative">
        <i class="bi bi-bell"></i>
        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
          3
        </span>
      </a>

      <div class="dropdown">
        <button class="btn btn-light dropdown-toggle d-flex align-items-center gap-2"
                data-bs-toggle="dropdown">
          <i class="bi bi-person-circle fs-5"></i>
          <span class="d-none d-md-inline">Admin</span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
         <li>
    <a class="dropdown-item" 
       th:href="@{/dashboard/getbyid1(id='00ee5b4b-7a6f-11f1-8f4f-183d2d227d02')}">
        Profile
    </a>
</li>
          <li><a class="dropdown-item" th:href="@{/teacher/settings}">Settings</a></li>
          <li><hr class="dropdown-divider"></li>
          <li><a class="dropdown-item text-danger" th:href="@{/logout}">Logout</a></li>
        </ul>
      </div>
    </div>
  </div>
</header>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
