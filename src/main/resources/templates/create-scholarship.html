<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragment/css :: css}">

<meta charset="UTF-8">

<title>Add Scholarship</title>

</head>


<body class="bg-light">







<div class="container mt-5 mb-5">



<div class="card shadow border-0">



<div class="card-header bg-primary text-white">

<h3 class="mb-0">
    Add Scholarship
</h3>

</div>




<div class="card-body">



<form th:action="@{/admin/save}"
      th:object="${scholarship}"
      method="post">






<!-- Course ID -->

<div class="mb-3">


<label class="form-label fw-bold">
    Course ID
</label>


<input type="text"
       class="form-control"
       th:field="*{courseID}"
       placeholder="Enter course ID"
       required>


</div>








<!-- Scholarship Name -->

<div class="mb-3">


<label class="form-label fw-bold">
    Scholarship Name
</label>


<input type="text"
       class="form-control"
       th:field="*{scholarshipName}"
       placeholder="Enter scholarship name"
       required>


</div>








<!-- Description -->

<div class="mb-3">


<label class="form-label fw-bold">
    Description
</label>



<textarea class="form-control"
          rows="4"
          th:field="*{description}"
          placeholder="Enter scholarship description"
          required>
</textarea>



</div>








<div class="row">



<!-- Discount Type -->

<div class="col-md-6 mb-3">


<label class="form-label fw-bold">
    Discount Type
</label>


<select class="form-select"
        th:field="*{discountType}"
        required>


<option value="">
    Select Discount Type
</option>


<option value="Percentage">
    Percentage
</option>


<option value="Fixed Amount">
    Fixed Amount
</option>


</select>


</div>







<!-- Discount Value -->

<div class="col-md-6 mb-3">


<label class="form-label fw-bold">
    Discount Value
</label>



<input type="number"
       step="0.01"
       class="form-control"
       th:field="*{discountValue}"
       placeholder="Enter discount value"
       required>



</div>



</div>









<!-- Max Recipients -->


<div class="mb-3">


<label class="form-label fw-bold">
    Max Recipients
</label>



<input type="number"
       min="1"
       class="form-control"
       th:field="*{maxRecipients}"
       placeholder="Enter maximum recipients"
       required>



</div>









<!-- Deadline -->


<div class="mb-3">


<label class="form-label fw-bold">
    Application Deadline
</label>



<input type="date"
       class="form-control"
       th:field="*{applicationDeadline}"
       required>



</div>









<!-- Status -->


<div class="mb-3">


<label class="form-label fw-bold">
    Status
</label>



<select class="form-select"
        th:field="*{isActive}">


<option value="1">
    Active
</option>


<option value="0">
    Inactive
</option>


</select>



</div>









<!-- Buttons -->


<div class="d-flex gap-2">


<button type="submit"
        class="btn btn-primary">

    Save Scholarship

</button>




<a th:href="@{/admin/list}"
   class="btn btn-secondary">

    Cancel

</a>



</div>







</form>



</div>


</div>


</div>









<!-- JavaScript -->

<div th:replace="~{fragment/js :: js}"></div>



</body>

</html>
