
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment List</title>

    <!-- Fragment Replacement -->
    <th:block th:replace="~{fragment/css :: css}"></th:block>

    <!-- Bootstrap Icons & Fonts -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">

    <style>
       body {
           font-family: 'Inter', sans-serif;
           background: #f8fafc;
           overflow-x: hidden;
       }

       .assignment-card {
           transition: .3s;
           border: 1px solid #e2e8f0;
       }

       .assignment-card:hover {
           transform: translateY(-5px);
           box-shadow: 0 12px 25px rgba(0,0,0,.08);
       }

       .assignment-card:hover .animated-icon {
           animation: wiggle .4s infinite alternate;
       }

       .hover-btn {
           transition: .3s;
       }

       .hover-btn:hover {
           transform: translateY(-2px);
       }

       @keyframes wiggle {
           from { transform: rotate(-8deg); }
           to { transform: rotate(8deg); }
       }

       main {
           min-height: calc(100vh - 130px);
       }

       @media(max-width:992px) {
           main {
               padding: 20px;
           }
       }

       @media(max-width:768px) {
           .card-body {
               padding: 1rem;
           }

           .btn {
               width: 100%;
           }

           .d-flex.justify-content-between.align-items-center.mt-auto {
               flex-direction: column;
               align-items: flex-start !important;
           }
       }

       @media(max-width:576px) {
           h2 {
               font-size: 1.5rem;
           }

           .assignment-card {
               border-radius: 18px;
           }
       }
    </style>
</head>
<body>

    <!-- Header -->
    <div th:replace="~{fragment/student-header :: studentHeader}"></div>

    <div class="d-flex flex-column flex-lg-row min-vh-100">

        <!-- Sidebar -->
        <div th:replace="~{fragment/student-sidebar :: studentSidebar}"></div>

        <!-- Main Wrapper -->
        <div class="flex-grow-1 d-flex flex-column min-vh-100">

            <!-- Main Content -->
            <main class="container-fluid flex-grow-1 px-3 px-md-4 py-4 overflow-auto">

                <!-- Header Title -->
                <div class="mb-4">
                    <h2 class="fw-bold text-dark mb-1">
                        <i class="bi bi-journal-bookmark-fill text-primary me-2"></i>
                        Available Assignments
                    </h2>
                    <p class="text-muted mb-0">
                        Manage your coursework, track deadlines, and submit your tasks.
                    </p>
                </div>

                <!-- Assignments -->
                <div class="row g-4">

                    <div class="col-12 col-md-6 col-xl-4"
                         th:each="a, stat : ${assignments}">

                        <div class="card assignment-card shadow-sm rounded-4 h-100">

                            <div class="card-body d-flex flex-column">

                                <!-- Course -->
                                <div class="d-flex justify-content-between mb-3">

                                    <span class="badge bg-primary-subtle text-primary rounded-pill">
                                        <i class="bi bi-bookmark-fill me-1"></i>
                                        <span th:text="${a.courseName}"></span>
                                    </span>

                                    <small class="text-muted"
                                           th:text="'#'+${stat.count}">
                                    </small>

                                </div>

                                <!-- Title -->
                                <div class="d-flex mb-3">

                                    <i class="bi bi-journal-text text-primary fs-4 me-2 animated-icon"></i>

                                    <h5 class="fw-bold mb-0"
                                        th:text="${a.title}">
                                    </h5>

                                </div>

                                <!-- Description -->
                                <p class="text-muted flex-grow-1"
                                   th:text="${a.description}">
                                </p>

                                <!-- Score -->
                                <div class="row g-2 mb-3">

                                    <div class="col-6">
                                        <div class="border rounded-3 p-2 text-center bg-light">
                                            <small class="text-muted">Max Score</small>
                                            <div class="fw-bold"
                                                 th:text="${a.score}">
                                            </div>
                                        </div>
                                    </div>

                                    <div class="col-6">
                                        <div class="border rounded-3 p-2 text-center bg-light">
                                            <small class="text-muted">Weight</small>
                                            <div class="fw-bold"
                                                 th:text="${a.weightPercent}+'%'">
                                            </div>
                                        </div>
                                    </div>

                                </div>

                                <hr>

                                <!-- Bottom -->
                                <div class="d-flex justify-content-between align-items-center mt-auto flex-wrap gap-2">

                                    <div>
                                        <small class="text-muted">
                                            <i class="bi bi-calendar-event text-danger"></i>
                                            Due Date
                                        </small>

                                        <div class="fw-bold text-danger"
                                             th:text="${#temporals.format(a.dueDate,'dd-MM-yyyy HH:mm')}">
                                        </div>

                                    </div>

                                 
 <!-- Not Submitted -->
<a th:if="${!a.submitted}"
   class="btn btn-primary rounded-pill"
   th:href="@{/student/submission/assignment/submit/{id}(id=${a.assignmentID})}">

    <i class="bi bi-cloud-arrow-up"></i>
    Submit

</a>


<!-- Already Submitted -->
<button th:if="${a.submitted}"
        class="btn btn-success rounded-pill"
        disabled>

    <i class="bi bi-check-circle"></i>
    Already Submitted

</button>
                                </div>

                            </div>

                        </div>

                    </div>

                    <!-- Empty State -->
                    <div class="col-12"
                         th:if="${#lists.isEmpty(assignments)}">

                        <div class="card shadow-sm border-0 rounded-4">

                            <div class="card-body text-center py-5">

                                <i class="bi bi-file-earmark-x display-3 text-secondary"></i>

                                <h4 class="mt-3">
                                    No Assignment Found
                                </h4>

                                <p class="text-muted">
                                    There are currently no active assignments allocated to you.
                                </p>

                            </div>

                        </div>

                    </div>

                </div>

            </main>

           
        </div>

    </div>
 <!-- Footer -->
            <div th:replace="~{fragment/footer :: footer}"></div>

    <!-- JS Scripts -->
    <div th:replace="~{fragment/js :: js}"></div>

</body>
</html>
