<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Submissions</title>
    <!-- Common CSS Fragment -->
    <th:block th:replace="~{fragment/css :: css}"></th:block>
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS Animation & UI Styles -->
    <style>
        .submission-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        /* Card hover animation */
        .submission-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1) !important;
        }
        .submission-card:hover .animated-icon {
            animation: wiggle 0.5s ease-in-out infinite alternate;
        } 
        .hover-btn {
            transition: transform 0.2s ease;
        }
        .hover-btn:hover {
            transform: translateY(-1px);
        }

        @keyframes wiggle {
            0% { transform: rotate(-10deg); }
            100% { transform: rotate(10deg); }
        }
    </style>
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <!-- Header -->
        <div th:replace="~{fragment/student-header :: studentHeader}"></div>


    <!-- Main Wrapper (Sidebar + Main Content Area) -->
    <div class="d-flex flex-grow-1">
        
        <!-- Sidebar -->
    <div th:replace="~{fragment/student-sidebar :: studentSidebar}"></div>

        <!-- Main Content Area -->
        <main class="flex-grow-1 py-5 px-3 px-md-4">
            <div class="container" style="max-width: 850px;">

                <!-- Title Header -->
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h3 class="fw-bold text-dark mb-1">
                            <i class="bi bi-journal-check me-2 text-primary"></i>My Assignment Submissions
                        </h3>
                        <p class="text-muted small mb-0">Track and review your graded academic works.</p>
                    </div>
                    <span class="badge bg-primary rounded-pill px-3 py-2 fw-semibold" 
                          th:text="${#lists.size(submissions)} + ' Total'">
                        0 Total
                    </span>
                </div>

                <!-- Submissions Stack Container -->
                <div class="d-flex flex-column gap-3">
                    
                    <!-- Individual Submission Item -->
                    <div th:each="s, stat : ${submissions}" class="card border-0 shadow-sm rounded-4 overflow-hidden submission-card">
                        <div class="card-body p-4">
                            <div class="row align-items-md-center">
                                
                                <!-- Left: Number, Title & Attached File -->
                                <div class="col-md-7 mb-3 mb-md-0">
                                    <div class="d-flex align-items-start gap-3">
                                        <!-- Number Badge & Icon -->
                                        <div class="d-flex flex-column align-items-center bg-light px-3 py-2 rounded-3 text-secondary">
                                            <span class="fw-bold fs-6 mb-0" th:text="${stat.count}">1</span>
                                            <i class="bi bi-file-earmark-text animated-icon fs-4 text-primary mt-1"></i>
                                        </div>
                                        
                                        <!-- Assignment Details -->
                                        <div>
                                            <h5 class="fw-bold text-dark mb-2 lh-base" th:text="${s.assignmentTitle}">
                                                Assignment Title
                                            </h5>
                                            
                                            <!-- File Link Button -->
                                            <div>
                                                <a th:if="${s.filePath != null}" 
                                                   th:href="@{${s.filePath}}" 
                                                   class="btn btn-sm btn-outline-primary rounded-pill px-3 hover-btn" 
                                                   target="_blank">
                                                    <i class="bi bi-eye me-1"></i> View Submitted File
                                                </a>
                                                <span th:if="${s.filePath == null}" class="text-muted small italic">
                                                    <i class="bi bi-exclamation-circle me-1"></i> No File Attached
                                                </span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                                <!-- Right: Grade / Score Box -->
                                <div class="col-md-5 text-md-end">
                                    <div class="d-inline-block text-md-start bg-light-subtle border rounded-3 p-3 w-100" style="max-width: 240px;">
                                        <small class="text-muted d-block text-uppercase fw-bold tracking-wider mb-1" style="font-size: 0.75rem;">
                                            <i class="bi bi-award me-1"></i> Score / Grade Status
                                        </small>
                                        
                                        <!-- Score Logic Check -->
                                        <span th:if="${s.score != null}" class="fs-4 fw-bold text-success" th:text="${s.score}">
                                            100
                                        </span>
                                        <span th:if="${s.score == null}" class="fs-6 fw-bold text-warning">
                                            <i class="bi bi-clock-history me-1"></i> Not Graded
                                        </span>
                                    </div>
                                </div>
                                
                            </div> <!-- /row -->
                            
                            <!-- Bottom Block: Teacher Feedback -->
                            <div th:if="${s.feedback != null && s.feedback != '-'}" 
                                 class="mt-3 pt-3 border-top text-secondary small bg-light p-3 rounded-3">
                                <strong class="text-dark"><i class="bi bi-chat-left-text me-1 text-primary"></i> Instructor Feedback:</strong>
                                <p class="mb-0 mt-1 lh-base" th:text="${s.feedback}">Review comments go here...</p>
                            </div>
                            
                        </div>
                    </div> <!-- /card -->

                    <!-- Empty State Fallback -->
                    <div th:if="${#lists.isEmpty(submissions)}" class="text-center py-5 bg-white rounded-4 shadow-sm">
                        <div class="mb-3">
                            <i class="bi bi-folder2-open text-muted" style="font-size: 3.5rem;"></i>
                        </div>
                        <h5 class="text-secondary fw-semibold">No Submissions Found</h5>
                        <p class="text-muted small mb-0">You have not uploaded any assignment records yet.</p>
                    </div>

                </div> <!-- /stack container -->
            </div>
        </main>
    </div>

    <!-- Footer Fragment -->
    <footer th:replace="~{fragment/footer :: footer}"></footer>

    <!-- JavaScript Fragment -->
    <div th:replace="~{fragment/js :: js}"></div>

</body>
</html>
