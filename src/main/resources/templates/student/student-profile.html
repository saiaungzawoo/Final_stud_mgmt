 <!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Profile</title>

    <th:block th:replace="~{fragment/css :: css}"></th:block>

    <style>
        .profile-card {
            border-radius: 20px;
            overflow: hidden;
        }

        .profile-header {
            background: linear-gradient(135deg, #0d6efd, #5aa2ff);
            color: white;
            text-align: center;
            padding: 30px;
        }

        .profile-img {
            width: 130px;
            height: 130px;
            object-fit: cover;
            border-radius: 50%;
            border: 5px solid white;
            margin-top: -70px;
            background: white;
        }

        .info-box {
            border-radius: 12px;
            background: #f8f9fa;
            padding: 12px 15px;
            margin-bottom: 10px;
        }

        .info-title {
            font-weight: 600;
            color: #555;
            font-size: 14px;
        }

        .info-value {
            font-size: 16px;
        }
    </style>
</head>

<body>

<div th:replace="~{fragment/header :: header}"></div>

<div class="container py-5">

    <div class="row">

        <!-- LEFT SIDEBAR -->
        <div class="col-lg-3 mb-4">

            <div class="card shadow border-0 rounded-3">

                <div class="card-body text-center">

                    <img th:src="${userObj.profileImage != null ? userObj.profileImage : '/images/default-user.png'}"
                         class="rounded-circle border border-3 border-primary shadow mb-3"
                         width="150"
                         height="150"
                         style="object-fit:cover;">

                    <h5 th:text="${userObj.name}"></h5>

                    <p class="text-muted small"
                       th:text="${userObj.email}"></p>

                </div>

                <div class="list-group list-group-flush">

                    <a href="#"
                       class="list-group-item list-group-item-action active">
                        👤 Profile
                    </a>

                    <a th:href="@{/student/update}"
                       class="list-group-item list-group-item-action">
                        ✏️ Edit Profile
                    </a>

                    
<a th:href="@{/logout}"
                       class="list-group-item list-group-item-action text-danger">
                        🚪 Logout
                    </a>

                </div>

            </div>

        </div>

        <!-- RIGHT CONTENT -->
        <div class="col-lg-9">

            <div class="card shadow border-0 rounded-4">

                <div class="card-header bg-primary text-white">

                    <h4 class="mb-0">
                        My Profile
                    </h4>

                </div>

                <div class="card-body">

                    <div class="row g-4">

                        <div class="col-md-6">

                            <label class="fw-bold">
                                Full Name
                            </label>

                            <input class="form-control"
                                   th:value="${userObj.name}"
                                   readonly>

                        </div>

                        <div class="col-md-6">

                            <label class="fw-bold">
                                Email
                            </label>

                            <input class="form-control"
                                   th:value="${userObj.email}"
                                   readonly>

                        </div>

                        <div class="col-md-6">

                            <label class="fw-bold"
                            >
                                Phone Number
                            </label>
 <input class="form-control"
                                   th:value="${userObj.phoneNumber}"
                                   readonly>

                        </div>

                        <div class="col-md-6">

                            <label class="fw-bold">
                                Gender
                            </label>

                            <input class="form-control"
                                   th:value="${userObj.gender}"
                                   readonly>

                        </div>

                        <div class="col-md-6">

                            <label class="fw-bold">
                                Date of Birth
                            </label>

                            <input class="form-control"
                                   th:value="${#temporals.format(userObj.dob,'dd MMM yyyy')}"
                                   readonly>

                        </div>

                        <div class="col-md-12">

                            <label class="fw-bold">
                                Address
                            </label>

                            <textarea class="form-control"
                                      rows="3"
                                      readonly
                                      th:text="${userObj.address}">
                            </textarea>

                        </div>

                    </div>

                    <div class="text-end mt-4">

                        <a th:href="@{/student/update}"
                           class="btn btn-primary px-4">

                            Edit Profile

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<div th:replace="~{fragment/footer :: footer}"></div>
<th:block th:replace="~{fragment/js :: js}"></th:block>

</body>
</html>
