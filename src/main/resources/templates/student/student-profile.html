<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Profile</title>
    <head th:replace="~{fragment/css :: css}"></head>
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS Animation & Profile UI Styles -->
    <style>
        .hover-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .hover-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1) !important;
        }
        
        /* Sidebar link item list effects */
        .list-group-item {
            transition: all 0.2s ease;
        }
        .list-group-item:hover:not(.active) {
            background-color: #f8f9fa;
            padding-left: 1.5rem;
            color: #0d6efd;
        }
        .list-group-item:hover .animated-icon {
            animation: wiggle 0.5s ease-in-out infinite alternate;
        }
        
        /* Card Header Icon hover effect */
        .hover-card:hover .header-icon {
            animation: wiggle 0.5s ease-in-out infinite alternate;
        }
        
        .hover-btn {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .hover-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1) !important;
        }

        @keyframes wiggle {
            0% { transform: rotate(-10deg); }
            100% { transform: rotate(10deg); }
        }
    </style>
</head>
<body class="bg-light">

<div th:replace="~{fragment/header :: header}"></div>

<div class="container py-5">
    <div class="row g-4">

        <!-- LEFT SIDEBAR -->
        <div class="col-lg-3">
            <div class="card shadow-sm border-0 rounded-4 overflow-hidden hover-card">
                
                <!-- Sidebar Top User Info -->
                <div class="card-body text-center pt-4">
                    <div class="position-relative d-inline-block mb-3">
                        <img th:src="${userObj.profileImage != null ? userObj.profileImage : '/images/default-user.png'}"
                             class="rounded-circle border border-3 border-primary shadow-sm"
                             width="130"
                             height="130"
                             style="object-fit:cover;">
                    </div>
                    <h5 class="fw-bold text-dark mb-1" th:text="${userObj.name}">User Name</h5>
                    <p class="text-muted small mb-2" th:text="${userObj.email}">user@email.com</p>
                </div>

                <!-- Sidebar Navigation Links -->
                <div class="list-group list-group-flush border-top border-light">
                    <a href="#" class="list-group-item list-group-item-action active px-4 py-3 d-flex align-items-center gap-2 fw-semibold">
                        <i class="bi bi-person-fill fs-5"></i> Profile Overview
                    </a>

                    <a th:href="@{/student/update}" class="list-group-item list-group-item-action px-4 py-3 d-flex align-items-center gap-2 text-secondary fw-medium">
                        <i class="bi bi-pencil-square animated-icon fs-5"></i> Edit Profile
                    </a>

                    <a th:href="@{/logout}" class="list-group-item list-group-item-action px-4 py-3 d-flex align-items-center gap-2 text-danger fw-medium border-top">
                        <i class="bi bi-door-open animated-icon fs-5"></i> Logout
                    </a>
                </div>

            </div>
        </div>

        <!-- RIGHT CONTENT (Profile Details) -->
        <div class="col-lg-9">
            <div class="card shadow-sm border-0 rounded-4 overflow-hidden hover-card">

                <!-- Header -->
                <div class="card-header bg-primary text-white py-4 px-4 border-0 d-flex align-items-center gap-3">
                    <i class="bi bi-shield-lock-fill header-icon fs-3 d-inline-block"></i>
                    <div>
                        <h4 class="mb-0 fw-bold">My Personal Profile</h4>
                        <p class="text-white-50 small mb-0 mt-0.5">View your account credentials and personal details</p>
                    </div>
                </div>

                <!-- Body fields -->
                <div class="card-body p-4 p-md-5 bg-white">
                    <div class="row g-4">

                        <!-- Full Name -->
                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-secondary small mb-2">
                                <i class="bi bi-person me-1"></i> Full Name
                            </label>
                            <input class="form-control rounded-3 p-2.5 bg-light text-dark fw-medium border-0"
                                   th:value="${userObj.name}"
                                   readonly>
                        </div>

                        <!-- Email Address -->
                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-secondary small mb-2">
                                <i class="bi bi-envelope me-1"></i> Email Address
                            </label>
                            <input class="form-control rounded-3 p-2.5 bg-light text-dark fw-medium border-0"
                                   th:value="${userObj.email}"
                                   readonly>
                        </div>

                        <!-- Phone Number -->
                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-secondary small mb-2">
                                <i class="bi bi-telephone me-1"></i> Phone Number
                            </label>
                            <input class="form-control rounded-3 p-2.5 bg-light text-dark fw-medium border-0"
                                   th:value="${userObj.phoneNumber}"
                                   readonly>
                        </div>

                        <!-- Gender -->
                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-secondary small mb-2">
                                <i class="bi bi-gender-ambiguous me-1"></i> Gender
                            </label>
                            <input class="form-control rounded-3 p-2.5 bg-light text-dark fw-medium border-0"
                                   th:value="${userObj.gender}"
                                   readonly>
                        </div>

                        <!-- Date of Birth -->
                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-secondary small mb-2">
                                <i class="bi bi-calendar3 me-1"></i> Date of Birth
                            </label>
                            <input class="form-control rounded-3 p-2.5 bg-light text-dark fw-medium border-0"
                                   th:value="${#temporals.format(userObj.dob,'dd MMM yyyy')}"
                                   readonly>
                        </div>

                        <!-- Full Address -->
                        <div class="col-md-12">
                            <label class="form-label fw-semibold text-secondary small mb-2">
                                <i class="bi bi-geo-alt me-1"></i> Residential Address
                            </label>
                            <textarea class="form-control rounded-3 p-3 bg-light text-dark fw-medium border-0"
                                      rows="3"
                                      readonly
                                      th:text="${userObj.address}"></textarea>
                        </div>

                    </div>

                    <!-- Actions -->
                    <div class="text-end mt-4 pt-4 border-top border-light">
                        <a th:href="@{/student/update}" class="btn btn-primary px-4 py-2 rounded-pill shadow-sm hover-btn">
                            Edit Profile <i class="bi bi-pencil-square ms-1 small"></i>
                        </a>
                    </div>
                </div>

            </div>
        </div>

    </div>
</div>

<div th:replace="~{fragment/footer :: footer}"></div>
<div th:replace="~{fragment/js :: js}"></div>

</body>
</html>
