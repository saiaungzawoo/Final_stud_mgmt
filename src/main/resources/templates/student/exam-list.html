
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Exams</title>

    <!-- CSS Fragment -->
    <th:block th:replace="~{fragment/css :: css}"></th:block>
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS Animation & UI Styles -->
    <style>
        .exam-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        /* Card ပေါ် mouse ရောက်ရင် ကြွတက်ပြီး Icon လှုပ်စေရန် */
        .exam-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.12) !important;
        }
        .exam-card:hover .animated-icon {
            animation: wiggle 0.5s ease-in-out infinite alternate;
        }
        .hover-btn {
            transition: transform 0.2s ease;
        }
        .hover-btn:hover {
            transform: translateY(-1px);
        }

        @keyframes wiggle {
            0% { transform: rotate(-10deg); }
            100% { transform: rotate(10deg); }
        }
    </style>
</head>
<body class="bg-light">

<div th:replace="~{fragment/header :: header}"></div>

<div class="container py-5">

    <!-- Header Section -->
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-center mb-5 gap-3">
        <div class="text-center text-md-start">
            <h1 class="fw-bold display-6 text-primary mb-1">
                My Upcoming Exams
            </h1>
            <p class="text-muted mb-0">Track your exam schedules, details, and upcoming tests.</p>
        </div>
        <a th:href="@{/student/exam/results}" class="btn btn-outline-success px-4 rounded-pill shadow-sm hover-btn fw-semibold">
            <i class="bi bi-trophy-fill me-1"></i> View Results
        </a>
    </div>

    <!-- Exam Responsive Cards Grid -->
    <div class="row g-4">
        <div class="col-md-6 col-lg-4" th:each="exam, stat : ${exams}">
            <div class="card shadow-sm border-0 h-100 exam-card rounded-4 overflow-hidden">
                <div class="card-body p-4 d-flex flex-column">

                    <!-- Top Row: Course Badge & Number -->
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="badge bg-primary-subtle text-primary border border-primary-subtle px-3 py-2 rounded-pill fw-semibold small">
                            <i class="bi bi-book-half me-1"></i>
                            <span th:text="${exam.courseName}">Course Name</span>
                        </span>
                        <small class="text-muted fw-bold" th:text="'#' + ${stat.count}">#1</small>
                    </div>

                    <!-- Title with Animated Icon -->
                    <div class="d-flex align-items-start gap-2 mb-3">
                        <i class="bi bi-file-earmark-text animated-icon text-primary fs-3 mt-1 d-inline-block"></i>
                        <h5 class="fw-bold text-dark mb-0 lh-base" th:text="${exam.name}">
                            Exam Name
                        </h5>
                    </div>

                    <!-- Type Badge -->
                    <div class="mb-3">
                        <span class="badge bg-secondary-subtle text-secondary border border-secondary-subtle rounded-pill px-2.5 py-1" 
                              th:text="${exam.examType}">
                            Offline
                        </span>
                    </div>

                    <!-- Score Stat Box -->
                    <div class="bg-light p-2.5 rounded-3 border border-light-subtle text-center mb-3">
                        <small class="text-muted d-block fw-semibold mb-1" style="font-size: 0.75rem;">Max Score</small>
                        <span class="fw-bold fs-5 text-dark" th:text="${exam.maxScore}">100</span>
                    </div>

                    <hr class="text-muted my-3 opacity-25">

                    <!-- Bottom Metadata & Actions -->
                    <div class="d-flex justify-content-between align-items-center mt-auto">
                        <div>
                            <small class="text-muted d-block fw-semibold mb-1" style="font-size: 0.75rem;">
                                <i class="bi bi-calendar-event text-danger me-1"></i> Exam Date
                            </small>
                            <span class="text-danger small fw-bold" th:text="${#temporals.format(exam.examDate, 'dd-MMM-yyyy hh:mm a')}">
                                20-Oct-2026 10:00 AM
                            </span>
                        </div>
                        
                        <!-- View Detail Button -->
                        <a class="btn btn-primary btn-sm px-3 rounded-pill shadow-sm hover-btn"
                           th:href="@{/student/exam/detail/{id}(id=${exam.examID})}">
                            Detail <i class="bi bi-arrow-right-short ms-1"></i>
                        </a>
                    </div>

                </div>
            </div>
        </div>

        <!-- Empty State Handling -->
        <div th:if="${#lists.isEmpty(exams)}" class="col-12 text-center py-5 bg-white rounded-4 shadow-sm">
            <div class="mb-3">
                <i class="bi bi-journal-x text-muted" style="font-size: 3.5rem;"></i>
            </div>
            <h5 class="text-secondary fw-semibold">No Exams Found</h5>
            <p class="text-muted small mb-0">There are currently no upcoming exams scheduled for your enrolled courses.</p>
        </div>
    </div>

</div>

<div th:replace="~{fragment/footer :: footer}"></div>
<div th:replace="~{fragment/js :: js}"></div>

</body>
</html>
