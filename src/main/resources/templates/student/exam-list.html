<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Exams</title>

    <!-- Global CSS Fragment -->
    <th:block th:replace="~{fragment/css :: css}"></th:block>
    
    <!-- Bootstrap Icons & Fonts -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">

    <!-- Custom Stylings & Animations -->
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #f8fafc;
            overflow-x: hidden;
        }

        .main-wrapper {
            min-height: 100vh;
        }

        /* Card Hover Effects */
        .exam-card {
            transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid #e2e8f0;
            will-change: transform, box-shadow;
        }

        .exam-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -6px rgba(15, 23, 42, 0.08), 0 4px 8px -4px rgba(15, 23, 42, 0.03) !important;
        }

        .exam-card:hover .animated-icon {
            animation: wiggle 0.4s ease-in-out infinite alternate;
        }

        .hover-btn {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .hover-btn:hover {
            transform: translateY(-1px);
        }

        @keyframes wiggle {
            0% { transform: rotate(-8deg); }
            100% { transform: rotate(8deg); }
        }

        /* Label Title Helper Class */
        .label-title {
            font-size: 0.75rem;
            letter-spacing: 0.03em;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

    <!-- STUDENT HEADER FRAGMENT -->
    <div th:replace="~{fragment/student-header :: studentHeader}"></div>

    <!-- MAIN WRAPPER (SIDEBAR + CONTENT) -->
    <div class="d-flex flex-column flex-lg-row flex-grow-1">
<!-- SIDEBAR FRAGMENT -->
        <div th:replace="~{fragment/student-sidebar :: studentSidebar}"></div>

       
        <!-- MAIN CONTENT AREA -->
        <div class="flex-grow-1 d-flex flex-column main-wrapper overflow-y-auto">

            <!-- PAGE CONTENT -->
            <main class="container-fluid p-3 p-sm-4 p-lg-5 flex-grow-1">

                <!-- Title Section & Actions -->
                <div class="d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center gap-3 mb-4">
                    <div>
                        <h2 class="fw-bold text-dark mb-1 fs-3 fs-md-2 d-flex align-items-center flex-wrap gap-2">
                            <i class="bi bi-journal-check text-primary"></i>
                            <span>My Upcoming Exams</span>
                        </h2>
                        <p class="text-muted small mb-0">Track your exam schedules, details, and upcoming tests.</p>
                    </div>
                    
                    <a th:href="@{/student/exam/results}" class="btn btn-outline-success px-4 rounded-pill shadow-sm hover-btn fw-semibold w-100 w-sm-auto text-center">
                        <i class="bi bi-trophy-fill me-1"></i> View Results
                    </a>
                </div>

                <!-- Exam Grid -->
                <div class="row g-3 g-md-4" th:if="${not #lists.isEmpty(exams)}">
                    <div class="col-12 col-md-6 col-xl-4" th:each="exam, stat : ${exams}">
                        <div class="card bg-white shadow-sm border-0 h-100 exam-card rounded-4">
                            <div class="card-body p-3 p-sm-4 d-flex flex-column">

                                <!-- Top Row: Course Badge & Index Number -->
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <span class="badge bg-primary-subtle text-primary border border-primary-subtle px-3 py-2 rounded-pill fw-semibold small text-truncate" style="max-width: 80%;">
                                        <i class="bi bi-book-half me-1"></i>
                                        <span th:text="${exam.courseName}">Course Name</span>
                                    </span>
                                    <small class="text-muted fw-bold" th:text="'#' + ${stat.count}">#1</small>
                                </div>

                                <!-- Title with Animated Icon -->
                                <div class="d-flex align-items-start gap-2 mb-3">
                                    <i class="bi bi-file-earmark-text animated-icon text-primary fs-3 mt-1 d-inline-block flex-shrink-0"></i>
                                    <h5 class="fw-bold text-dark mb-0 lh-sm fs-6 fs-sm-5" th:text="${exam.name}">
                                        Exam Name
                                    </h5>
                                </div>

                                <!-- Exam Type Badge -->
                                <div class="mb-3">
                                    <span class="badge bg-secondary-subtle text-secondary border border-secondary-subtle rounded-pill px-3 py-1.5 fw-medium small" 
                                          th:text="${exam.examType}">
                                        Offline
                                    </span>
                                </div>

                                <!-- Max Score Box -->
                                <div class="bg-light p-2.5 rounded-3 border border-light-subtle text-center mb-3">
                                    <small class="text-muted d-block fw-semibold mb-1 label-title text-uppercase">Max Score</small>
                                    <span class="fw-bold fs-5 text-dark" th:text="${exam.maxScore}">100</span>
                                </div>

                                <hr class="text-muted my-2 opacity-25">

                                <!-- Bottom Metadata & Action -->
                                <div class="d-flex justify-content-between align-items-center mt-auto pt-2">
                                    <div>
                                        <small class="text-muted d-block fw-semibold mb-1 label-title text-uppercase">
                                            <i class="bi bi-calendar-event text-danger me-1"></i> Exam Date
                                        </small>
                                        <span class="text-danger small fw-bold" th:text="${#temporals.format(exam.examDate, 'dd-MMM-yyyy hh:mm a')}">
                                            20-Oct-2026 10:00 AM
                                        </span>
                                    </div>
                                    
                                    <!-- Detail Action -->
                                    <a class="btn btn-primary btn-sm px-3 rounded-pill shadow-sm hover-btn fw-medium"
                                       th:href="@{/student/exam/detail/{id}(id=${exam.examID})}">
                                        Detail <i class="bi bi-arrow-right-short ms-1"></i>
                                    </a>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>

                <!-- Empty State Handling -->
                <div th:if="${#lists.isEmpty(exams)}" class="text-center py-5 my-4 bg-white rounded-4 shadow-sm border mx-auto px-4" style="max-width: 520px;">
                    <div class="mb-3">
                        <div class="bg-light d-inline-flex p-3 rounded-circle text-muted">
                            <i class="bi bi-journal-x fs-1"></i>
                        </div>
                    </div>
                    <h4 class="text-secondary fw-semibold">No Exams Found</h4>
                    <p class="text-muted small mb-0">There are currently no upcoming exams scheduled for your enrolled courses.</p>
                </div>

            </main>

           
        </div>
    </div>

 <!-- FOOTER FRAGMENT -->
            <div th:replace="~{fragment/footer :: footer}"></div>

    <!-- Global JS Fragment -->
    <div th:replace="~{fragment/js :: js}"></div>

</body>
</html>
