<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Exam Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0" th:text="${exam.name}">Exam Title</h4>
                </div>
                <div class="card-body">
                    <div class="alert alert-info">
                        ℹ️ <strong>Note:</strong> This is an <strong>Offline Exam</strong>. Please attend the physical exam room on the scheduled date and time.
                    </div>

                    <table class="table table-borderless">
                        <tr>
                            <th width="30%">Course:</th>
                            <td th:text="${exam.courseName}">Course Name</td>
                        </tr>
                        <tr>
                            <th>Exam Type:</th>
                            <td th:text="${exam.examType}">Offline Written</td>
                        </tr>
                        <tr>
                            <th>Max Score:</th>
                            <td th:text="${exam.maxScore}">100</td>
                        </tr>
                        <tr>
                            <th>Weight Percentage:</th>
                            <td th:text="${exam.weightPercent + '%'}">20%</td>
                        </tr>
                        <tr>
                            <th>Exam Date & Time:</th>
                            <td class="fw-bold text-danger" th:text="${#temporals.format(exam.examDate, 'dd-MMMM-yyyy (hh:mm a)')}">01-Jan-2026</td>
                        </tr>
                        <tr>
                            <th>Duration:</th>
                            <td th:text="${exam.durationMinutes + ' Minutes'}">120 Minutes</td>
                        </tr>
                    </table>

                    <div class="d-flex justify-content-between mt-4">
                        <a th:href="@{/student/exam/list}" class="btn btn-outline-secondary">Back to List</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
