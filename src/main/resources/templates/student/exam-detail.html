<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Detail</title>
    
    <!-- Include Common CSS Fragment -->
    <head th:replace="~{fragment/css :: css}"></head>
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
     .main-wrapper {
            flex: 1;
        }
        
        
       
    </style>
</head>
<body class="bg-light">

    <!-- STUDENT HEADER FRAGMENT -->
    <div th:replace="~{fragment/student-header :: studentHeader}"></div>

    <!-- Main Content Area with Sidebar Grid -->
    <div class="container-fluid main-wrapper">
        <div class="row">

            <!-- SIDEBAR FRAGMENT -->
            <div class="col-md-3 col-lg-2 px-0 bg-white border-end">
                <div th:replace="~{fragment/student-sidebar :: studentSidebar}"></div>
            </div>

            <!-- MAIN CONTENT AREA -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4 py-md-5">
                <div class="row justify-content-center">
                    <div class="col-12 col-xl-10">

                        <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
                            <!-- Card Header -->
                            <div class="card-header bg-primary text-white py-3 border-0 d-flex align-items-center">
                                <i class="bi bi-file-earmark-text fs-4 me-2"></i>
                                <h4 class="mb-0 fw-bold fs-5 fs-md-4" th:text="${exam.name}">Exam Title</h4>
                            </div>

                            <!-- Card Body -->
                            <div class="card-body p-3 p-md-5">
                                <div class="alert alert-info d-flex align-items-center mb-4 rounded-3">
                                    <i class="bi bi-info-circle-fill fs-4 me-3 flex-shrink-0"></i>
                                    <div>
                                        <strong>Note:</strong> This is an <strong>Offline Exam</strong>. Please attend the physical exam room on the scheduled date and time.
                                    </div>
                                </div>

                                <!-- Responsive Table Wrapper -->
                                <div class="table-responsive">
                                    <table class="table table-borderless align-middle mb-0">
                                        <tbody>
                                            <tr class="border-bottom">
                                                <th style="min-width: 140px; width: 35%;" class="py-3 text-secondary">
                                                    <i class="bi bi-book me-2 text-primary"></i>Course:
                                                </th>
                                                <td class="py-3 fw-semibold" th:text="${exam.courseName}">Course Name</td>
                                            </tr>
                                            <tr class="border-bottom">
                                                <th class="py-3 text-secondary">
                                                    <i class="bi bi-tag me-2 text-primary"></i>Exam Type:
                                                </th>
                                                <td class="py-3" th:text="${exam.examType}">Offline Written</td>
                                            </tr>
                                            <tr class="border-bottom">
                                                <th class="py-3 text-secondary">
                                                    <i class="bi bi-check2-circle me-2 text-primary"></i>Max Score:
                                                </th>
                                                <td class="py-3" th:text="${exam.maxScore}">100</td>
                                            </tr>
                                            <tr class="border-bottom">
                                                <th class="py-3 text-secondary">
                                                    <i class="bi bi-percent me-2 text-primary"></i>Weight Percentage:
                                                </th>
                                                <td class="py-3" th:text="${exam.weightPercent + '%'}">20%</td>
                                            </tr>
                                            <tr class="border-bottom">
                                                <th class="py-3 text-secondary">
                                                    <i class="bi bi-calendar-event me-2 text-primary"></i>Exam Date & Time:
                                                </th>
                                                <td class="py-3 fw-bold text-danger" th:text="${#temporals.format(exam.examDate, 'dd-MMMM-yyyy (hh:mm a)')}">01-Jan-2026</td>
                                            </tr>
                                            <tr>
                                                <th class="py-3 text-secondary">
                                                    <i class="bi bi-clock me-2 text-primary"></i>Duration:
                                                </th>
                                                <td class="py-3" th:text="${exam.durationMinutes + ' Minutes'}">120 Minutes</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>

                                <!-- Actions -->
                                <div class="d-flex justify-content-start mt-4 pt-2">
                                    <a th:href="@{/student/exam/list}" class="btn btn-outline-secondary px-4 rounded-pill">
                                        <i class="bi bi-arrow-left me-1"></i> Back to List
                                    </a>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </main>

        </div>
    </div>

    <!-- Footer Fragment -->
    <div th:replace="~{fragment/footer :: footer}"></div>

    <!-- JS Fragment -->
    <div th:replace="~{fragment/js :: js}"></div>

</body>
</html>
