 <!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile</title>
    <head th:replace="~{fragment/css :: css}"></head>
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS Animation & Form UI Styles -->
    <style>
        .edit-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        /* Card ပေါ် mouse ရောက်ရင် Header က Icon လှုပ်စေရန် */
        .edit-card:hover .animated-icon {
            animation: wiggle 0.5s ease-in-out infinite alternate;
        }
        /* Button Hover Effect */
        .hover-btn {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .hover-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1) !important;
        }

        @keyframes wiggle {
            0% { transform: rotate(-10deg); }
            100% { transform: rotate(10deg); }
        }
    </style>
</head>
<body class="bg-light">

<div th:replace="~{fragment/header :: header}"></div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10">

            <!-- Edit Card Layout -->
            <div class="card shadow-sm border-0 rounded-4 overflow-hidden edit-card">

                <!-- Card Header -->
                <div class="card-header bg-primary text-white text-center py-4 border-0">
                    <div class="mb-2">
                        <i class="bi bi-person-gear animated-icon d-inline-block fs-1"></i>
                    </div>
                    <h3 class="mb-0 fw-bold">Edit Profile</h3>
                    <p class="text-white-50 small mb-0 mt-1">Modify your personal credentials and upload a new profile photo</p>
                </div>

                <!-- Card Body -->
                <div class="card-body p-4 p-md-5 bg-white">

                    <form th:action="@{/student/update}"
                          th:object="${userObj}"
                          method="post"
                          enctype="multipart/form-data">

                        <!-- Hidden ID -->
                        <input type="hidden" th:field="*{userID}">

                        <!-- Profile Photo Upload Section -->
                        <div class="text-center mb-5">
                            <div class="position-relative d-inline-block mb-3">
                                <img th:src="${userObj.profileImage != null ? userObj.profileImage : '/images/default-user.png'}"
                                     class="rounded-circle border border-3 border-light shadow-sm"
                                     width="130"
                                     height="130"
                                     style="object-fit: cover;">
                            </div>
                            <div class="mx-auto" style="max-width: 350px;">
                                <input type="file"
                                       name="photo"
                                       class="form-control rounded-3"
                                       accept="image/*">
                                <small class="text-muted d-block mt-1">Upload a new photo to change your current avatar</small>
                            </div>
                        </div>

                        <!-- Form Input Fields (Grid Style) -->
                        <div class="row g-4">
                            
                            <!-- Full Name -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-dark mb-2">
                                    <i class="bi bi-person me-1 text-primary"></i> Full Name
                                </label>
                                <input type="text" th:field="*{name}" class="form-control rounded-3 p-2.5">
                                <div class="text-danger small mt-1" th:errors="*{name}"></div>
                            </div>

                            <!-- Email -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-dark mb-2">
                                    <i class="bi bi-envelope me-1 text-primary"></i> Email Address
                                </label>
                                <input type="email" th:field="*{email}" class="form-control rounded-3 p-2.5">
                                <div class="text-danger small mt-1" th:errors="*{email}"></div>
                            </div>

                            <!-- Password Update -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-dark mb-2">
                                    <i class="bi bi-key me-1 text-primary"></i> New Password
                                </label>
                                <input type="password" name="password" class="form-control rounded-3 p-2.5" 
                                       placeholder="Leave blank to keep current">
                                <div class="text-muted-emphasis small mt-1" style="font-size: 0.8rem;">
                                    Leave blank if you don't want to change your password.
                                </div>
                                <div class="text-danger small mt-1" th:errors="*{password}"></div>
                            </div>

                            <!-- Phone Number -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-dark mb-2">
                                    <i class="bi bi-telephone me-1 text-primary"></i> Phone Number
                                </label>
                                <input type="text" th:field="*{phoneNumber}" class="form-control rounded-3 p-2.5">
                                <div class="text-danger small mt-1" th:errors="*{phoneNumber}"></div>
                            </div>

                            <!-- Date of Birth -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-dark mb-2">
                                    <i class="bi bi-calendar3 me-1 text-primary"></i> Date of Birth
                                </label>
                                <input type="text" th:field="*{dob}" class="form-control rounded-3 p-2.5" placeholder="dd-MM-yyyy">
                                <div class="text-danger small mt-1" th:errors="*{dob}"></div>
                            </div>

                            <!-- Gender -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-dark mb-2">
                                    <i class="bi bi-gender-ambiguous me-1 text-primary"></i> Gender
                                </label>
                                <div class="pt-2">
                                    <div class="form-check form-check-inline me-4">
                                        <input class="form-check-input" type="radio" th:field="*{gender}" value="Male" id="genderMale">
                                        <label class="form-check-label text-dark fw-medium" for="genderMale">Male</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" th:field="*{gender}" value="Female" id="genderFemale">
                                        <label class="form-check-label text-dark fw-medium" for="genderFemale">Female</label>
                                    </div>
                                </div>
                                <div class="text-danger small mt-1" th:errors="*{gender}"></div>
                            </div>

                            <!-- Address -->
                            <div class="col-12">
                                <label class="form-label fw-semibold text-dark mb-2">
                                    <i class="bi bi-geo-alt me-1 text-primary"></i> Residential Address
                                </label>
                                <textarea th:field="*{address}" rows="3" class="form-control rounded-3 p-3"></textarea>
                                <div class="text-danger small mt-1" th:errors="*{address}"></div>
                            </div>

                        </div>

                        <hr class="text-muted opacity-25 my-4">

                        <!-- Action Controls -->
                        <div class="d-flex flex-column-reverse flex-sm-row justify-content-end gap-2">
                            <a th:href="@{/student/profile}" class="btn btn-outline-secondary px-4 py-2 rounded-pill hover-btn w-100 w-sm-auto text-center">
                                Cancel
                            </a>
                            <button class="btn btn-primary px-4 py-2 rounded-pill shadow-sm hover-btn w-100 w-sm-auto" type="submit">
                                Update Profile <i class="bi bi-check2-circle ms-1"></i>
                            </button>
                        </div>

                    </form>
                </div>

            </div> <!-- /card -->

        </div>
    </div>
</div>

<div th:replace="~{fragment/footer :: footer}"></div>
<div th:replace="~{fragment/js :: js}"></div>
   
</body>
</html>
