<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Exam Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>My Exam Results</h2>
        <a th:href="@{/student/exam/list}" class="btn btn-outline-primary">Back to Exams</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-striped align-middle mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>Exam Name</th>
                        <th>Course</th>
                        <th>Obtained Score / Max</th>
                        <th>Remarks / Feedback</th>
                        <th>Graded Date</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(results)}">
                        <td colspan="5" class="text-center py-4 text-muted">No exam results published yet.</td>
                    </tr>
                    <tr th:each="res : ${results}">
                        <td class="fw-bold" th:text="${res.name}">Midterm Exam</td>
                        <td th:text="${res.courseName}">Database Systems</td>
                        <td>
                            <span class="badge bg-success fs-6" th:text="${res.obtainedScore}">85</span>
                            / <span th:text="${res.maxScore}">100</span>
                        </td>
                        <td th:text="${res.remarks != null ? res.remarks : 'No remarks'}">Good job!</td>
                        <td th:text="${#temporals.format(res.gradedAt, 'dd-MMM-yyyy')}">25-Oct-2026</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
