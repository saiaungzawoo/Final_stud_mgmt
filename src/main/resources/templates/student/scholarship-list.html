<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Available Scholarships</title>
    <head th:replace="~{fragment/css :: css}"></head>
    
    <!-- Bootstrap Icons (မပါသေးရင် သုံးနိုင်ရန်) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS Animation Stylings -->
    <style>
        /* Card Hover Effect */
        .scholarship-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .scholarship-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.12) !important;
        }

      /*   /* /* Icon Wiggle Animation */
       /*  .scholarship-card:hover .animated-icon {
            animation: wiggle 0.5s ease-in-out infinite alternate;
        } */ */

       /*  @keyframes wiggle {
            0% { transform: rotate(-10deg); }
            100% { transform: rotate(10deg); }
        } */ */
    </style>
</head>
<body class="bg-light">

<div th:replace="~{fragment/header :: header}"></div>

<div class="container py-5">

    <!-- Header Title Section -->
    <div class="text-center mb-5">
        <h1 class="fw-bold display-5 text-primary mb-2">
            Available Scholarships
        </h1>
        <p class="text-muted fs-5">
            Explore scholarships and apply for your future today.
        </p>
    </div>

    <!-- Scholarships Grid -->
    <div class="row g-4">
        <div class="col-md-6 col-lg-4" th:each="sch : ${scholarshipList}">
            <div class="card shadow-sm border-0 h-100 scholarship-card rounded-3">
                <div class="card-body p-4 d-flex flex-column">
                    
                    <!-- Header with Icon -->
                    <div class="d-flex align-items-start gap-3 mb-3">
                        <div class="p-2 bg-light rounded text-primary fs-4">
                            <!-- Hover တင်ရင် လှုပ်မည့် Cap Icon -->
                            <i class="bi bi-mortarboard animated-icon d-inline-block"></i>
                        </div>
                        <h5 class="fw-bold text-dark mb-0 lh-base" th:text="${sch.scholarshipName}">
                            Scholarship Name
                        </h5>
                    </div>

                    <!-- Course Info -->
                    <div class="mb-2">
                        <span class="badge bg-primary-subtle text-primary border border-primary-subtle px-2.5 py-1.5 rounded">
                            <i class="bi bi-book-half me-1"></i>
                            <span th:text="${sch.courseName}">Course Name</span>
                        </span>
                    </div>

                    <!-- Description -->
                    <p class="text-muted small flex-grow-1 my-3" th:text="${sch.description}">
                        Scholarship description goes here...
                    </p>

                    <hr class="text-muted my-3 opacity-25">

                    <!-- Deadline & Actions -->
                    <div class="d-flex justify-content-between align-items-center mt-auto">
                        <div>
                            <small class="text-muted d-block fw-semibold mb-0.5">
                                <i class="bi bi-calendar-x me-1"></i> Deadline
                            </small>
                            <span class="text-danger small fw-bold" th:text="${sch.applicationDeadline}">2026-12-31</span>
                        </div>
                        
                        <a class="btn btn-primary btn-sm px-3 rounded-pill shadow-sm"
                           th:href="@{/scholarship/{id}(id=${sch.scholarshipID})}">
                            View Detail <i class="bi bi-arrow-right-short ms-1"></i>
                        </a>
                    </div>

                </div>
            </div>
        </div>
        
        <!-- Empty State Handling (Optional but safe to have) -->
        <div th:if="${#lists.isEmpty(scholarshipList)}" class="col-12 text-center py-5 text-muted">
            <i class="bi bi-exclamation-circle fs-2"></i>
            <p class="mt-2">No scholarships available at the moment.</p>
        </div>
    </div>

    <!-- Back Button (ကတ်ထဲမှာမထည့်ဘဲ အောက်ခြေမှာ သီးသန့်ပြထားခြင်း) -->
    <div class="text-center mt-5">
        <a th:href="@{/}" class="btn btn-outline-secondary px-4 rounded-pill">
            <i class="bi bi-arrow-left me-1"></i> Back to Home
        </a>
    </div>

</div> 

<div th:replace="~{fragment/footer :: footer}"></div>
<div th:replace="~{fragment/js :: js}"></div>
   
</body>
</html>
