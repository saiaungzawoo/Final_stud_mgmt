<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragment/css :: css}"></head>

<body>

	<div th:replace="~{fragment/header :: header}"></div>


	<main>

		<section class="section-pad bg-light">

			<div class="container-xxl">

				<div class="row justify-content-center">

					<div class="col-lg-8 col-xl-7">


						<article class="course-card bg-white">


							<div class="course-body p-5">


								<div class="text-center mb-5">

									<span class="eyebrow"> Installment Payment </span>

									<h1 class="fw-bold mb-2">Pay Installment</h1>

									<p class="text-muted mb-0">Complete your next installment
										securely.</p>

								</div>



								<form th:action="@{/payment/installment/pay}" method="post">



									<input type="hidden" name="installmentPlanId"
										th:value="${plan.installmentPlanId}">



									<!-- Enrollment Details -->

									<div class="category-card mb-4">


										<h5 class="fw-bold mb-3">Enrollment Details</h5>


										<div class="row">


											<div class="col-md-6 mb-3">

												<label class="form-label fw-semibold"> Course </label> <input
													type="text" class="form-control" th:value="${course.name}"
													readonly>

											</div>



											<div class="col-md-6 mb-3">

												<label class="form-label fw-semibold"> Installment </label>

												<input type="text" class="form-control"
													th:value="${plan.installmentNumber} + ' installment'"
													readonly>

											</div>




											<div class="col-md-6 mb-3">

												<label class="form-label fw-semibold"> Amount </label> <input
													type="text" class="form-control"
													th:value="${plan.amountDue + ' MMK'}" readonly>

											</div>




											<div class="col-md-6 mb-3">

												<label class="form-label fw-semibold"> Due Date </label> <input
													type="text" class="form-control" th:value="${plan.dueDate}"
													readonly>

											</div>


										</div>


									</div>





									<!-- Payment Method -->

									<div class="category-card">


										<h5 class="fw-bold mb-4">Choose Payment Method</h5>




										<div th:each="method : ${paymentMethods}"
											class="form-check mb-3">


											<input class="form-check-input" type="radio"
												name="paymentMethodId" th:value="${method.paymentMethodId}"
												required> <label class="form-check-label"> <span
												th:text="${method.name}"> Payment Method </span>

											</label>


										</div>




										<hr class="my-4">





										<div class="d-flex justify-content-between align-items-center">


											<div>

												<small class="text-muted"> Amount to Pay </small>


												<h3 class="fw-bold text-primary mb-0"
													th:text="${plan.amountDue + ' MMK'}">400 MMK</h3>


											</div>




											<button type="submit" class="btn btn-primary btn-lg">

												Confirm Payment</button>



										</div>


									</div>



								</form>



							</div>


						</article>


					</div>


				</div>


			</div>


		</section>


	</main>



	<div th:replace="~{fragment/footer :: footer}"></div>

	<div th:replace="~{fragment/js :: js}"></div>


</body>

</html>
